<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tim's Journal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    :root {
      --bg:             #0d0d0d;
      --surface:        #171717;
      --surface2:       #202020;
      --border:         #2a2a2a;
      --text:           #e4e4e4;
      --muted:          #777;
      --accent:         #c8a96e;
      --accent-dim:     rgba(200,169,110,0.12);
      --green:          #6eb87e;
      --green-dim:      rgba(110,184,126,0.12);
      --red:            #c87070;
      --red-dim:        rgba(200,112,112,0.12);
      --card-bg:        #f5f0e8;
      --card-border:    #ddd5c0;
      --card-bg2:       #ede8e0;
      --card-bg3:       #ece5d4;
      --card-text:      #3a2e1e;
      --card-muted:     #8a7a5a;
      --card-accent:    #8a6030;
      --card-btn-bg:    rgba(180,140,80,0.14);
      --card-btn-bd:    rgba(180,140,80,0.4);
      --card-btn-color: #7a6040;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { overflow-x: hidden; max-width: 100vw; -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
    body { background: var(--bg); color: var(--text); font-family: 'Jost', -apple-system, sans-serif; min-height: 100dvh; -webkit-font-smoothing: antialiased; }

    /* ── Lock screen ── */
    #lockScreen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 24px; padding: 32px; z-index: 999; }
    .lock-title { font-size: 28px; font-weight: 700; color: var(--accent); letter-spacing: 0.04em; }
    .lock-sub   { font-size: 13px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }
    #lockError  { font-size: 14px; color: var(--red); min-height: 20px; text-align: center; }

    /* ── Shared header ── */
    .j-header { background: var(--bg); padding: 14px 16px 0; position: sticky; top: 0; z-index: 30; }
    .j-title-row { font-size: 11px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); padding-bottom: 10px; border-bottom: 1px solid var(--border); margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
    .j-nav-row { display: flex; align-items: center; gap: 8px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
    .j-nav-btn { width: 34px; height: 34px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; background: var(--accent-dim); border: 1px solid rgba(200,169,110,0.45); border-radius: 8px; cursor: pointer; color: var(--accent); font-size: 20px; line-height: 1; user-select: none; }
    .j-nav-btn.text { width: auto; padding: 0 12px; font-size: 12px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; }
    .j-nav-btn.disabled { opacity: 0.3; cursor: default; }
    .j-date-block { flex: 1; text-align: center; }
    .j-day-label  { font-size: 10px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 2px; }
    .j-date-label { font-size: 17px; font-weight: 700; color: var(--accent); white-space: nowrap; }
    .j-filter-btn { width: 34px; height: 34px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; background: var(--accent-dim); border: 1px solid rgba(200,169,110,0.45); border-radius: 8px; cursor: pointer; user-select: none; }
    .j-filter-lines { display: flex; flex-direction: column; gap: 3px; align-items: center; }
    .j-filter-line  { background: var(--accent); border-radius: 1px; height: 1.5px; }
    .j-filter-line:nth-child(1) { width: 14px; }
    .j-filter-line:nth-child(2) { width: 9px; }
    .j-filter-line:nth-child(3) { width: 5px; }
    .j-editing-label { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }

    /* ── Views ── */
    .view { display: none; padding: 14px 14px 60px; }
    .view.active { display: block; }

    /* ── Journal cards ── */
    .j-card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 12px; overflow: hidden; margin-bottom: 14px; }
    .j-card-header { display: flex; align-items: center; gap: 8px; padding: 10px 14px 8px; border-bottom: 1px solid var(--card-border); }
    .j-card-title { font-size: 10px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--card-muted); flex: 1; }
    .j-card-body  { padding: 10px 14px 12px; }
    .j-btn { display: flex; align-items: center; gap: 3px; font-size: 11px; color: var(--card-btn-color); font-family: 'Jost', sans-serif; background: var(--card-btn-bg); border: 1px solid var(--card-btn-bd); border-radius: 5px; padding: 4px 9px; cursor: pointer; white-space: nowrap; user-select: none; flex-shrink: 0; }
    .j-edit-btn { display: flex; align-items: center; gap: 3px; font-size: 11px; color: var(--card-btn-color); font-family: 'Jost', sans-serif; background: var(--card-btn-bg); border: 1px solid var(--card-btn-bd); border-radius: 5px; padding: 4px 9px; cursor: pointer; user-select: none; }
    .j-icon-btn { width: 26px; height: 26px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; background: var(--card-btn-bg); border: 1px solid var(--card-btn-bd); border-radius: 50%; cursor: pointer; color: var(--card-btn-color); font-size: 14px; }
    .j-save-btn { display: inline-flex; align-items: center; gap: 3px; font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #6b4a10; font-family: 'Jost', sans-serif; background: var(--accent); border: 1px solid rgba(160,110,30,0.5); border-radius: 5px; padding: 4px 10px; cursor: pointer; white-space: nowrap; user-select: none; flex-shrink: 0; }

    /* Task list */
    .j-list-label { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--card-accent); margin: 12px 0 4px; display: flex; align-items: center; justify-content: space-between; }
    .j-list-label:first-child { margin-top: 0; }
    .j-list-count { font-size: 10px; color: var(--card-muted); background: var(--card-bg3); border: 1px solid var(--card-border); border-radius: 4px; padding: 1px 6px; }
    .j-add-btn { font-size: 11px; color: var(--card-accent); background: rgba(180,140,80,0.1); border: 1px solid rgba(180,140,80,0.3); border-radius: 4px; padding: 2px 7px; cursor: pointer; font-family: 'Jost', sans-serif; user-select: none; text-transform: none; font-weight: 400; letter-spacing: normal; }
    .j-task-row { display: flex; align-items: center; gap: 6px; padding: 5px 0; border-bottom: 1px solid rgba(0,0,0,0.06); position: relative; }
    .j-task-row:last-child { border-bottom: none; }
    .j-task-row.drag-over { border-top: 2px solid var(--card-accent); }
    .j-drag-handle { color: #c8b89a; font-size: 14px; cursor: grab; flex-shrink: 0; user-select: none; -webkit-user-select: none; touch-action: none; }
    .j-task-list-pill { font-size: 11px; color: var(--card-muted); background: var(--card-bg3); border: 1px solid var(--card-border); border-radius: 5px; padding: 2px 6px; flex-shrink: 0; }
    .j-task-list-pill select { background: transparent; border: none; color: var(--card-accent); font-family: 'Jost', sans-serif; font-size: 11px; padding: 0; cursor: pointer; -webkit-appearance: none; }
    .j-task-title { flex: 1; font-size: 14px; color: var(--card-text); background: transparent; border: none; font-family: 'Jost', sans-serif; padding: 2px 0; min-width: 0; }
    .j-task-title:focus { outline: none; }
    .j-star-btn { background: none; border: none; font-size: 16px; cursor: pointer; flex-shrink: 0; padding: 0; line-height: 1; }
    .j-del-btn  { background: none; border: none; font-size: 14px; cursor: pointer; flex-shrink: 0; padding: 0; color: #bbb; line-height: 1; }

    /* Star action popup */
    .star-popup { position: absolute; right: 40px; top: 50%; transform: translateY(-50%); background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 8px; padding: 4px; display: flex; gap: 4px; z-index: 10; }
    .star-popup-btn { font-size: 11px; color: var(--card-btn-color); font-family: 'Jost', sans-serif; background: var(--card-btn-bg); border: 1px solid var(--card-btn-bd); border-radius: 4px; padding: 4px 8px; cursor: pointer; white-space: nowrap; user-select: none; }

    /* Read task rows */
    .j-read-task { font-size: 15px; color: var(--card-text); line-height: 1.6; padding: 5px 0 5px 20px; position: relative; border-bottom: 1px solid rgba(0,0,0,0.06); }
    .j-read-task:last-child { border-bottom: none; }
    .j-read-task::before { content: '•'; position: absolute; left: 5px; color: var(--card-muted); }
    .j-read-star { color: #b07030; margin-right: 3px; font-size: 12px; }

    /* Reflection */

    /* Reflection general textarea */
    .j-textarea { width: 100%; min-height: 38px; height: 38px; overflow-y: hidden; background: var(--card-bg3); border: none; color: var(--card-text); font-family: 'Jost', sans-serif; font-size: 14px; line-height: 1.65; padding: 8px 14px; resize: none; display: block; }
    .j-textarea:focus { outline: none; }
    .j-textarea::placeholder { color: var(--card-muted); }
    /* Reflection list sections */
    .refl-tag-add-row { display: flex; align-items: center; flex-wrap: wrap; gap: 6px; padding: 8px 14px; border-top: 1px solid var(--card-border); background: var(--card-bg2); }
    .refl-section { border-top: 1px solid var(--card-border); }
    .refl-section-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 14px 0; }
    .refl-section-label { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--card-accent); }
    .refl-section-del { background: none; border: none; font-size: 13px; color: #bbb; cursor: pointer; padding: 0; line-height: 1; }
    .refl-section-ta { width: 100%; min-height: 38px; height: 38px; overflow-y: hidden; background: var(--card-bg3); border: none; border-top: 1px solid var(--card-border); color: var(--card-text); font-family: 'Jost', sans-serif; font-size: 14px; line-height: 1.65; padding: 8px 14px; resize: none; display: block; margin-top: 6px; }
    .refl-section-ta:focus { outline: none; }
    .refl-section-ta::placeholder { color: var(--card-muted); }
    /* Read view reflection */
    .j-icon-btn.spinning { animation: rot 0.65s linear infinite; }
    .refl-read-general { font-size: 14px; color: var(--card-text); line-height: 1.9; padding: 10px 14px 8px; white-space: pre-line; }
    .refl-read-section { border-top: 1px solid var(--card-border); padding: 10px 14px; }
    .refl-read-label { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--card-accent); margin-bottom: 5px; }
    .refl-read-text { font-size: 14px; color: var(--card-text); line-height: 1.75; white-space: pre-line; }

    /* Add strip */
    .j-add-strip { border-top: 1px solid var(--card-border); padding: 8px 14px; display: flex; gap: 8px; background: var(--card-bg2); }
    .j-strip-btn { flex: 1; padding: 8px 0; text-align: center; font-size: 12px; color: var(--card-btn-color); font-family: 'Jost', sans-serif; background: var(--card-btn-bg); border: 1px solid var(--card-btn-bd); border-radius: 7px; cursor: pointer; user-select: none; }

    /* Extracted tasks */
    .j-extracted { display: none; padding: 10px 14px; border-top: 1px solid var(--card-border); background: var(--card-bg3); }
    .j-extracted textarea { width: 100%; min-height: 80px; background: transparent; border: none; color: var(--card-text); font-family: 'Jost', sans-serif; font-size: 13px; line-height: 1.6; resize: none; }
    .j-extracted textarea:focus { outline: none; }
    .j-extracted-actions { display: flex; gap: 8px; margin-top: 8px; }

    /* Filter panel */
    .filter-panel { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 16px; }
    .filter-panel-inner { display: flex; flex-direction: column; gap: 12px; }
    .fp-row { display: flex; align-items: flex-end; gap: 10px; }
    .fp-label { font-size: 12px; color: var(--muted); display: flex; flex-direction: column; gap: 5px; flex: 1; font-family: 'Jost', sans-serif; letter-spacing: 0.04em; text-transform: uppercase; }
    .fp-label input, .fp-label select { font-size: 14px; padding: 8px 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'Jost', sans-serif; color-scheme: dark; -webkit-appearance: none; }

    /* Book page */
    .book-page { overflow: hidden; position: relative; min-height: calc(100dvh - 160px); }
    .book-content { padding: 16px 14px 60px; }

    /* Quick pick frequency panel */
    .qp-freq-btn { font-size: 11px; color: var(--card-accent); background: rgba(180,140,80,0.1); border: 1px solid rgba(180,140,80,0.3); border-radius: 4px; padding: 2px 7px; cursor: pointer; font-family: 'Jost', sans-serif; user-select: none; text-transform: none; font-weight: 400; letter-spacing: normal; }
    .qp-freq-btn.active { background: var(--accent); color: #6b4a10; border-color: rgba(160,110,30,0.5); font-weight: 600; }
    .qp-panel { background: var(--card-bg2); border-top: 1px solid var(--card-border); }
    .qp-header { font-size: 9px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--card-muted); padding: 6px 14px 4px; }
    .qp-item { display: flex; align-items: center; gap: 8px; padding: 6px 14px; border-bottom: 1px solid rgba(0,0,0,0.05); cursor: pointer; }
    .qp-item:last-child { border-bottom: none; }
    .qp-item.already-added { opacity: 0.4; pointer-events: none; }
    .qp-title { flex: 1; font-size: 13px; color: var(--card-text); }
    .qp-count { font-size: 10px; color: var(--card-muted); background: var(--card-bg3); border-radius: 4px; padding: 1px 5px; border: 1px solid var(--card-border); flex-shrink: 0; }
    .qp-add { font-size: 16px; color: var(--card-accent); flex-shrink: 0; line-height: 1; }
    .review-period-btn { font-size: 12px; font-weight: 500; color: var(--muted); background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 6px 12px; cursor: pointer; user-select: none; white-space: nowrap; }
    .review-period-btn.active { background: var(--accent-dim); border-color: rgba(200,169,110,0.45); color: var(--accent); font-weight: 600; }

    /* Review drill-down */
    .h-stat-row { display: flex; align-items: center; gap: 10px; padding: 7px 0; border-bottom: 1px solid rgba(0,0,0,0.06); cursor: pointer; user-select: none; }
    .h-stat-row:last-of-type { border-bottom: none; }
    .h-stat-row.active .h-list-name { color: var(--accent); }
    .review-detail { margin-top: 14px; }
    .review-detail-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .review-detail-title { font-size: 10px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--card-muted); }
    .review-summary { font-size: 15px; color: var(--card-text); line-height: 1.8; padding: 12px 14px; background: var(--card-bg3); border-radius: 8px; margin-bottom: 14px; font-style: italic; }
    .review-date-group { margin-bottom: 12px; }
    .review-date-label { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--card-muted); padding: 6px 0 4px; border-bottom: 1px solid var(--card-border); margin-bottom: 4px; }
    .review-task-item { font-size: 14px; color: var(--card-text); line-height: 1.6; padding: 4px 0 4px 18px; position: relative; border-bottom: 1px solid rgba(0,0,0,0.04); }
    .review-task-item:last-child { border-bottom: none; }
    .review-task-item::before { content: '•'; position: absolute; left: 4px; color: var(--card-muted); }
    .review-task-star { color: #b07030; margin-right: 3px; font-size: 12px; } background: var(--accent-dim); border: 1px solid rgba(200,169,110,0.45); border-radius: 6px; padding: 5px 10px; cursor: pointer; user-select: none; font-size: 14px; font-weight: 600; color: var(--accent); display: inline-block; }
    .h-range-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
    .h-range-label { font-size: 10px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
    .h-list-name { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--card-accent); width: 72px; flex-shrink: 0; }
    .h-bar-wrap  { flex: 1; height: 8px; background: var(--card-bg3); border-radius: 4px; overflow: hidden; }
    .h-bar-fill  { height: 100%; border-radius: 4px; background: var(--accent); }
    .h-count     { font-size: 14px; font-weight: 600; color: var(--card-text); width: 40px; text-align: right; flex-shrink: 0; font-family: 'Jost', sans-serif; }
    .h-rule      { border: none; border-top: 1px solid var(--card-border); margin: 8px 0 6px; }
    .h-total-row { display: flex; align-items: center; justify-content: space-between; padding: 2px 0; }
    .h-total-label { font-size: 10px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--card-muted); }
    .h-total-count { font-size: 14px; font-weight: 600; color: var(--card-text); font-family: 'Jost', sans-serif; }

    /* Status / spinner */
    .status { font-size: 14px; padding: 10px 12px; border-radius: 8px; margin: 8px 0; line-height: 1.45; }
    .status.info { background: var(--accent-dim); color: var(--accent); }
    .status.ok   { background: var(--green-dim);  color: var(--green);  }
    .status.err  { background: var(--red-dim);    color: var(--red);    }
    .spin { display: inline-block; width: 13px; height: 13px; border: 2px solid rgba(255,255,255,0.15); border-top-color: currentColor; border-radius: 50%; animation: rot 0.65s linear infinite; vertical-align: -2px; }
    @keyframes rot { to { transform: rotate(360deg); } }

    input[type="date"] { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'Jost', sans-serif; font-size: 15px; padding: 8px 12px; color-scheme: dark; -webkit-appearance: none; direction: ltr; text-align: left; }
    select { -webkit-appearance: none; }
    .empty-note { font-size: 14px; color: var(--card-muted); text-align: center; padding: 16px 0; font-style: italic; }
    .book-empty { text-align: center; color: var(--muted); font-size: 14px; padding: 60px 0; font-style: italic; }
  </style>
</head>
<body>

<!-- ══════════════ LOCK SCREEN ══════════════ -->
<div id="lockScreen">
  <div class="lock-title">Tim's Journal</div>
  <div class="lock-sub">Sign in to continue</div>
  <div id="googleSignInBtn"></div>
  <div id="lockError"></div>
</div>

<!-- ══════════════ WRITE VIEW ══════════════ -->
<section class="view" id="writeView">
  <div class="j-header">
    <div class="j-title-row">
      <span>Tim's Journal</span>
    </div>
    <div class="j-nav-row">
      <div class="j-nav-btn" onclick="changeWriteDate(offsetDate(getWriteDate(),-1))">‹</div>
      <div class="j-date-block">
        <div class="j-day-label" id="writeDayLabel">✏ Editing</div>
        <div class="j-date-label" id="writeDateLabel" data-date=""></div>
      </div>
      <div class="j-nav-btn" onclick="changeWriteDate(offsetDate(getWriteDate(),1))">›</div>
      <div class="j-nav-btn text" onclick="exitWriteToRead()">Exit</div>
    </div>
  </div>

  <div style="padding:14px 14px 0;">

    <!-- Completed tasks card -->
    <div class="j-card">
      <div class="j-card-header">
        <span class="j-card-title">Completed tasks</span>
        <div class="j-save-btn" id="tasksSaveBtn" style="display:none;" onclick="saveTasks()">Save</div>
        <div class="j-icon-btn" onclick="refreshTasks()" title="Reload">↻</div>
      </div>
      <div class="j-card-body" id="tasksDisplay"><div class="empty-note">Loading…</div></div>
      <input type="file" id="screenshotInput" accept="image/*" multiple style="position:absolute;left:-9999px;width:1px;height:1px;opacity:0;">
      <div class="j-add-strip">
        <div class="j-strip-btn" onclick="document.getElementById('screenshotInput').click()">📷 Screenshot</div>
        <div class="j-strip-btn" id="taskRecordBtn" onclick="toggleTaskRecording()">🎤 Record</div>
      </div>
      <div id="tasksImportStatus" style="padding:0 14px;"></div>
      <div class="j-extracted" id="tasksExtracted">
        <textarea id="extractedBox" placeholder="Extracted tasks will appear here…"></textarea>
        <div class="j-extracted-actions">
          <div class="j-btn" onclick="addExtractedTasks()">Add to tasks</div>
          <div class="j-btn" onclick="clearImport()">Clear</div>
        </div>
      </div>
      <div id="tasksSaveStatus" style="padding:0 14px;"></div>
    </div>

    <!-- Reflection card -->
    <div class="j-card">
      <div class="j-card-header">
        <span class="j-card-title">Reflection</span>
        <div class="j-save-btn" id="reflectionSaveBtn" style="display:none;" onclick="saveReflection()">Save</div>
      </div>
      <textarea class="j-textarea" id="reflectionBox" placeholder="Write your reflection for today…" oninput="autoExpand(this);onReflectionChange()"></textarea>
      <div class="refl-tag-add-row" id="reflTagAddRow"></div>
      <div id="reflSectionsDisplay"></div>
      <input type="file" id="photoInput" accept="image/*" style="position:absolute;left:-9999px;width:1px;height:1px;opacity:0;" onchange="handleReflectionPhoto(event)">
      <div class="j-add-strip">
        <div class="j-strip-btn" onclick="captureReflPhotoTarget();document.getElementById('photoInput').click()">📷 Screenshot</div>
        <div class="j-strip-btn" id="reflectionRecordBtn" onclick="toggleReflectionRecording()">🎤 Record</div>
      </div>
      <div id="reflectionImportStatus" style="padding:0 14px;"></div>
      <div id="reflectionSaveStatus" style="padding:0 14px;"></div>
    </div>

  </div>
</section>

<script>
  // ── Config ────────────────────────────────────────────────
  const SCRIPT_URL       = 'https://script.google.com/macros/s/AKfycbxhwLpYwMqAI6IQaZEBueSkvpqaCGfb06uUsCK6cFYHjKK5tHBId3HVzS-U4Uq6o_kJ/exec';
  const GOOGLE_CLIENT_ID = '334749757917-t606nr5dfec4h2va1dah61nu9rm5rbk9.apps.googleusercontent.com';

  // ── State ─────────────────────────────────────────────────
  let idToken          = null;
  let tasksData        = [];
  let existingPageId   = null;
  let extractedTasks   = [];
  let tasksDirty       = false;
  let reflectionDirty  = false;

  // Book
  let bookEntries      = [];
  let bookIndex        = 0;
  let bookField        = 'all';
  let bookFilterList   = 'all';
  let bookLoadingMore  = false;
  let stepsInDir       = 0;
  let lastDir          = 0;

  // Voice
  let taskRecognition  = null, taskVoiceTranscript = '', taskRecording = false;
  let reflRecognition  = null, reflVoiceTranscript = '', reflRecording = false;

  const LIST_ORDER   = ['Basic', 'Personal', 'Work', 'Zipf'];
  const LIST_OPTIONS = ['Basic', 'Personal', 'Work', 'Zipf', 'Other'];

  // ── Utilities ─────────────────────────────────────────────
  function isoDate(d)   { return d.toISOString().split('T')[0]; }
  function esc(s)       { if(!s)return''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function showStatus(id,msg,type){const el=document.getElementById(id);if(el)el.innerHTML=`<div class="status ${type}">${msg}</div>`;}
  function autoClear(id,ms){setTimeout(()=>{const el=document.getElementById(id);if(el)el.innerHTML='';},ms);}
  function toBase64(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file);});}

  function getWriteDate() { return document.getElementById('writeDateLabel').dataset.date || isoDate(new Date()); }
  function offsetDate(dateStr, days) { const d=new Date(dateStr+'T12:00:00'); d.setDate(d.getDate()+days); return isoDate(d); }

  function setWriteDate(dateStr) {
    const d = new Date(dateStr+'T12:00:00');
    document.getElementById('writeDateLabel').dataset.date = dateStr;
    document.getElementById('writeDateLabel').textContent  = d.toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});
    document.getElementById('writeDayLabel').textContent   = '✏ Editing';
  }

  // ── API ───────────────────────────────────────────────────
  async function api(action, params) {
    const res  = await fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify({action, params:params||{}, idToken}) });
    const text = await res.text();
    if (text.trim().startsWith('<')) throw new Error('Apps Script error — check deployment.');
    const data = JSON.parse(text);
    if (!data.success) throw new Error(data.error);
    return data.data;
  }

  // ── Google Auth ───────────────────────────────────────────
  function initGoogleAuth() {
    google.accounts.id.initialize({ client_id: GOOGLE_CLIENT_ID, callback: handleCredentialResponse, auto_select: true });
    google.accounts.id.renderButton(document.getElementById('googleSignInBtn'), { theme:'outline', size:'large', text:'sign_in_with', shape:'pill' });
    google.accounts.id.prompt();
  }

  function handleCredentialResponse(response) {
    idToken = response.credential;
    document.getElementById('lockScreen').style.display = 'none';
    initApp();
  }

  document.addEventListener('DOMContentLoaded', () => {
    const iv = setInterval(() => { if (window.google&&google.accounts) { clearInterval(iv); initGoogleAuth(); } }, 100);
    document.getElementById('screenshotInput').addEventListener('change', function() { if(this.files&&this.files.length) extractFromScreenshot(); });
  });

  // ── Init — launch on Write screen for today ───────────────
  function initApp() {
    const todayStr = isoDate(new Date());
    document.getElementById('filterJumpDate').value = todayStr;
    showWriteScreen(todayStr);
  }

  // ── Navigation ────────────────────────────────────────────
  function showView(id) { ['writeView','readView','reviewView'].forEach(v => document.getElementById(v).classList.remove('active')); document.getElementById(id).classList.add('active'); }

  let freqCache      = {}; // { list: [{title, count}] } — loaded once per write session
  let freqCacheLoaded = false;
  let openFreqList   = null; // which list's freq panel is currently open

  function showWriteScreen(date) {
    showView('writeView');
    tasksData=[]; existingPageId=null; tasksDirty=false; reflectionDirty=false;
    document.getElementById('tasksSaveBtn').style.display      = 'none';
    document.getElementById('reflectionSaveBtn').style.display = 'none';
    document.getElementById('tasksDisplay').innerHTML = '<div class="empty-note">Loading…</div>';
    resetReflection();
    openFreqList = null;
    setWriteDate(date);
    loadWriteEntry(date);
    // Load frequency cache in background if not already loaded
    if (!freqCacheLoaded) loadFreqCache();
  }

  async function loadFreqCache() {
    try {
      // Load last 90 days of entries to build frequency counts
      const to   = new Date();
      const from = new Date(); from.setDate(from.getDate() - 90);
      const entries = await api('getEntries', { startDate: isoDate(from), endDate: isoDate(to) });
      const counts = {}; // { list: { title: count } }
      entries.forEach(entry => {
        if (!entry.tasksText) return;
        parseTasksText(entry.tasksText).forEach(t => {
          const list = LIST_OPTIONS.includes(t.list) ? t.list : 'Other';
          if (!counts[list]) counts[list] = {};
          const key = t.title.trim().toLowerCase();
          counts[list][key] = (counts[list][key] || 0) + 1;
          // Store the display title from first occurrence
          if (!counts[list][key + '__title']) counts[list][key + '__title'] = t.title.trim();
        });
      });
      // Convert to sorted arrays
      freqCache = {};
      LIST_OPTIONS.forEach(list => {
        if (!counts[list]) { freqCache[list] = []; return; }
        const items = Object.keys(counts[list])
          .filter(k => !k.endsWith('__title'))
          .map(k => ({ title: counts[list][k + '__title'] || k, count: counts[list][k] }))
          .sort((a, b) => b.count - a.count)
          .slice(0, 15);
        freqCache[list] = items;
      });
      freqCacheLoaded = true;
    } catch(e) { /* silent — freq is optional */ }
  }

  function exitWriteToRead() {
    const date = getWriteDate();
    showView('readView');
    if (!bookEntries.length) { loadReadView(); return; }
    const idx = bookEntries.findIndex(e => e.date === date);
    if (idx >= 0) {
      bookIndex = idx;
      api('getEntryForDate',{date}).then(entry => {
        if (entry) { bookEntries[bookIndex].tasksText=entry.tasksText; bookEntries[bookIndex].reflection=entry.reflection; }
        renderBookPage(false);
      }).catch(()=>renderBookPage(false));
    } else { loadReadView(); }
  }

  function goToReview() {
    showView('reviewView');
    selectPeriod('week');
  }

  function exitReview() {
    showView('readView');
    if (!bookEntries.length) loadReadView();
    else renderBookPage(false);
  }

  // ── Write screen ──────────────────────────────────────────
  async function loadWriteEntry(date) {
    document.getElementById('tasksDisplay').innerHTML = '<div class="empty-note">Loading…</div>';
    try {
      const entry = await api('getEntryForDate', {date});
      if (entry) {
        existingPageId = entry.id;
        tasksData = parseTasksText(entry.tasksText);
        const refl = reflectionParse(entry.reflection);
        document.getElementById('reflectionBox').value = refl.general;
        setTimeout(() => autoExpand(document.getElementById('reflectionBox')), 0);
        reflSections = refl.sections || [];
      } else {
        tasksData = [];
        reflSections = [];
      }
      renderWriteTasks();
      renderReflSections();
    } catch(e) {
      document.getElementById('tasksDisplay').innerHTML = '<div class="empty-note" style="color:var(--red);">Error loading.</div>';
    }
  }

  function changeWriteDate(dateStr) {
    tasksData=[]; existingPageId=null; tasksDirty=false; reflectionDirty=false; openFreqList=null;
    document.getElementById('tasksSaveBtn').style.display      = 'none';
    document.getElementById('reflectionSaveBtn').style.display = 'none';
    resetReflection();
    setWriteDate(dateStr);
    loadWriteEntry(dateStr);
  }

  async function refreshTasks() {
    const date = getWriteDate();
    const btn = document.querySelector('.j-icon-btn[onclick="refreshTasks()"]');
    if (btn) btn.classList.add('spinning');
    document.getElementById('tasksDisplay').innerHTML = '<div class="empty-note">Loading…</div>';
    try {
      const entry = await api('getEntryForDate',{date});
      if (entry) { tasksData=parseTasksText(entry.tasksText); existingPageId=entry.id; } else tasksData=[];
      tasksDirty=false; document.getElementById('tasksSaveBtn').style.display='none';
      renderWriteTasks();
    } catch(e) { showStatus('tasksSaveStatus','Error: '+e.message,'err'); }
    finally { if (btn) btn.classList.remove('spinning'); }
  }

  // ── Reflection tag ────────────────────────────────────────
  // ── Reflection sections ───────────────────────────────────
  // reflSections: array of { list, text } — list-tagged additions to the general reflection
  let reflSections = [];

  function reflectionSerialise() {
    const general = document.getElementById('reflectionBox').value.trim();
    const sections = reflSections.filter(s => s.text && s.text.trim());
    if (!sections.length) return general; // plain text — fully backward compatible
    return JSON.stringify({ general, sections });
  }

  function reflectionParse(raw) {
    if (!raw) return { general: '', sections: [] };
    try {
      const p = JSON.parse(raw);
      // Current format: { general, sections }
      if (p && typeof p === 'object' && 'general' in p) return { general: p.general || '', sections: p.sections || [] };
      // Old single-tag format: { tag, text }
      if (p && p.text !== undefined && !Array.isArray(p)) return { general: p.text || '', sections: [] };
      // Old structured blocks format: array of { list, thankful, sad, learned, thoughts }
      if (Array.isArray(p)) {
        const LABELS = { thankful: 'Thankful for', sad: 'Sad about', learned: 'Learned', thoughts: 'Thoughts' };
        const sections = [];
        p.forEach(block => {
          const parts = ['thankful','sad','learned','thoughts']
            .filter(f => block[f] && block[f].trim())
            .map(f => `${LABELS[f]}: ${block[f].trim()}`);
          if (parts.length) sections.push({ list: block.list || 'Other', text: parts.join('\n') });
        });
        return { general: '', sections };
      }
    } catch(e) {}
    return { general: raw, sections: [] }; // legacy plain text
  }

  function renderReflTagRow() {
    const usedLists = new Set(reflSections.map(s => s.list));
    const available = LIST_OPTIONS.filter(l => !usedLists.has(l));
    const row = document.getElementById('reflTagAddRow');
    row.innerHTML = available.map(l => `<div class="j-add-btn" onclick="addReflSection('${l}')">+ ${l}</div>`).join('');
  }

  function renderReflSections() {
    const display = document.getElementById('reflSectionsDisplay');
    display.innerHTML = reflSections.map((s, i) =>
      `<div class="refl-section">
        <div class="refl-section-header">
          <span class="refl-section-label">${esc(s.list)}</span>
          <button class="refl-section-del" onclick="removeReflSection(${i})">✕</button>
        </div>
        <textarea class="refl-section-ta" placeholder="${esc(s.list)} reflection…"
          oninput="autoExpand(this);updateReflSection(${i}, this.value)">${esc(s.text||'')}</textarea>
      </div>`
    ).join('');
    renderReflTagRow();
    // Auto-expand any pre-filled textareas
    setTimeout(() => document.querySelectorAll('.refl-section-ta, .j-textarea').forEach(autoExpand), 0);
  }

  function addReflSection(list) {
    reflSections.push({ list, text: '' });
    renderReflSections(); // don't mark dirty — no content yet
    setTimeout(() => {
      const tas = document.querySelectorAll('.refl-section-ta');
      if (tas.length) { tas[tas.length-1].focus(); tas[tas.length-1].scrollIntoView({behavior:'smooth',block:'nearest'}); }
    }, 50);
  }

  function removeReflSection(i) {
    reflSections.splice(i, 1);
    renderReflSections();
    // Only dirty if there was content in the removed section
    onReflectionChange();
  }

  function updateReflSection(i, value) {
    if (reflSections[i]) { reflSections[i].text = value; onReflectionChange(); }
  }

  function resetReflection() {
    reflSections = [];
    document.getElementById('reflectionBox').value = '';
    renderReflSections();
  }

  function onReflectionChange() {
    reflectionDirty = true;
    document.getElementById('reflectionSaveBtn').style.display = 'flex';
  }

  async function saveReflection() {
    const btn=document.getElementById('reflectionSaveBtn');
    const date=getWriteDate();
    if(!date){showStatus('reflectionSaveStatus','No date set.','err');return;}
    btn.innerHTML='<span class="spin"></span> Saving…'; btn.style.display='flex';
    const payload={date, tasksText:tasksAsText(), reflection:reflectionSerialise()};
    try {
      if(existingPageId){await api('updateEntry',{pageId:existingPageId,payload});}
      else{const r=await api('saveEntry',{payload});existingPageId=r.id;}
      reflectionDirty=false; btn.style.display='none'; btn.textContent='Save';
      showStatus('reflectionSaveStatus','✓ Saved','ok'); autoClear('reflectionSaveStatus',3000);
    } catch(e){btn.textContent='Save'; showStatus('reflectionSaveStatus','Error: '+e.message,'err');}
  }

  // ── Screenshot extraction ─────────────────────────────────
  // ── Tasks ─────────────────────────────────────────────────
  function parseTasksText(raw) {
    if (!raw) return [];
    return raw.split('\n').map(l => {
      const line = l.replace(/^•\s*/,'').trim();
      const m    = line.match(/^\[(.+?)\]\s+(★\s+)?(.+)$/);
      if (m) return { list:m[1], starred:!!m[2], title:m[3] };
      const starred = line.startsWith('★ ');
      return { list:'Other', starred, title: starred ? line.slice(2) : line };
    }).filter(t => t.title);
  }

  function tasksAsText() {
    return tasksData.map(t => {
      const list = LIST_OPTIONS.includes(t.list) ? t.list : 'Other';
      const star = t.starred ? '★ ' : '';
      return `• [${list}] ${star}${t.title}`;
    }).join('\n');
  }

  function groupByList(tasks) {
    const groups = {};
    tasks.forEach((t,i) => {
      const list = LIST_OPTIONS.includes(t.list) ? t.list : 'Other';
      if (!groups[list]) groups[list]=[];
      groups[list].push({...t, idx:i});
    });
    const keys = Object.keys(groups).sort((a,b) => {
      const ai=LIST_ORDER.indexOf(a), bi=LIST_ORDER.indexOf(b);
      if(ai===-1&&bi===-1) return a.localeCompare(b);
      if(ai===-1) return 1; if(bi===-1) return -1;
      return ai-bi;
    });
    return keys.map(k=>({list:k,items:groups[k]}));
  }

  function flushTaskInputs() {
    // Sync title inputs back to tasksData using the row's data-idx
    document.querySelectorAll('.j-task-row').forEach(row => {
      const idx = parseInt(row.dataset.idx);
      const inp = row.querySelector('.j-task-title');
      if (inp && !isNaN(idx) && tasksData[idx] !== undefined) {
        tasksData[idx].title = inp.value;
      }
    });
  }

  function renderWriteTasks() {
    const display = document.getElementById('tasksDisplay');
    const groups = groupByList(tasksData);
    let html = '';
    LIST_OPTIONS.forEach(list => {
      const group = groups.find(g => g.list === list);
      const isOpen = openFreqList === list;
      html += `<div class="j-list-label">
        <span>${esc(list)}</span>
        <div style="display:flex;gap:4px;">
          <div class="j-add-btn" onclick="addTaskToList('${list}')">+ Add</div>
          <div class="qp-freq-btn${isOpen?' active':''}" onclick="toggleFreqPanel('${list}')">↓ Freq</div>
        </div>
      </div>`;
      if (group) {
        group.items.forEach(item => {
          const opts = LIST_OPTIONS.map(l=>`<option value="${l}"${l===item.list?' selected':''}>${l}</option>`).join('');
          const starBtn = item.starred
            ? `<button class="j-star-btn" onclick="promptStarAction(${item.idx})" style="color:#c8a96e" title="Starred">★</button>`
            : `<button class="j-star-btn" onclick="toggleStar(${item.idx})" style="color:#c8b89a">☆</button>`;
          html += `<div class="j-task-row" data-idx="${item.idx}">
            <span class="j-drag-handle">⠿</span>
            <div class="j-task-list-pill"><select onchange="updateTaskList(${item.idx},this.value)">${opts}</select></div>
            <input class="j-task-title" type="text" value="${esc(item.title)}"
              oninput="var r=this.closest('.j-task-row');var i=parseInt(r.dataset.idx);if(!isNaN(i)&&tasksData[i])tasksData[i].title=this.value;markTasksDirty()">
            ${starBtn}
            <button class="j-del-btn" onclick="deleteTask(${item.idx})">✕</button>
          </div>`;
        });
      }
      // Freq panel for this list
      if (isOpen) {
        const items = freqCache[list] || [];
        const existingTitles = new Set(tasksData.map(t=>t.title.trim().toLowerCase()));
        html += `<div class="qp-panel"><div class="qp-header">Most completed — ${esc(list)}</div>`;
        if (!items.length) {
          html += `<div style="font-size:13px;color:var(--card-muted);padding:8px 14px;font-style:italic;">${freqCacheLoaded?'No history yet.':'Loading…'}</div>`;
        } else {
          items.forEach(item => {
            const alreadyAdded = existingTitles.has(item.title.toLowerCase());
            html += `<div class="qp-item${alreadyAdded?' already-added':''}" onclick="${alreadyAdded?'':` addFromFreq('${esc(list)}','${esc(item.title).replace(/'/g,"\\'")}') `}">
              <span class="qp-title">${esc(item.title)}</span>
              <span class="qp-count">×${item.count}</span>
              <span class="qp-add">${alreadyAdded?'✓':'＋'}</span>
            </div>`;
          });
        }
        html += `</div>`;
      }
    });
    display.innerHTML = html;
    bindDrag();
  }

  function toggleFreqPanel(list) {
    openFreqList = openFreqList === list ? null : list;
    renderWriteTasks();
  }

  function addFromFreq(list, title) {
    const existing = tasksData.map(t=>t.title.trim().toLowerCase());
    if (existing.includes(title.trim().toLowerCase())) return;

    markTasksDirty();
    renderWriteTasks(); // keeps panel open

  function buildPageHTML(entry){
    const field=bookField, flist=bookFilterList; let html='';
    const showTasks      = field === 'all' || field === 'starred_reflections';
    const showReflection = field === 'all' || field === 'starred_reflections' || field === 'reflection';

    // Tasks (all tasks for Everything; starred only for Starred & reflections)
    if (showTasks && entry.tasksText) {
      let taskObjs = parseTasksText(entry.tasksText);
      if (field === 'starred_reflections') taskObjs = taskObjs.filter(t => t.starred);
      if (flist !== 'all') taskObjs = taskObjs.filter(t => (LIST_OPTIONS.includes(t.list) ? t.list : 'Other') === flist);
      if(taskObjs.length){
        const groups=groupByList(taskObjs);
        const withH=groups.length>1||(groups.length===1&&groups[0].list!=='Other');
        let inner='';
        groups.forEach(g=>{
          if(withH)inner+=`<div class="j-list-label"><span>${esc(g.list)}</span><span class="j-list-count">+${g.items.length}</span></div>`;
          g.items.forEach(t=>{const star=t.starred?`<span class="j-read-star">★</span>`:'';inner+=`<div class="j-read-task">${star}${esc(t.title)}</div>`;});
        });
        html+=`<div class="j-card"><div class="j-card-header"><span class="j-card-title">Completed tasks</span><div class="j-edit-btn" onclick="showWriteScreen('${entry.date}')">✏ Edit</div></div><div class="j-card-body">${inner}</div></div>`;
      }
    }

    // Reflection
    if(showReflection && entry.reflection){
      const refl = reflectionParse(entry.reflection);
      // Apply focus filter: if flist set, only show if general exists or a section matches
      let sections = refl.sections || [];
      if(flist !== 'all') sections = sections.filter(s => s.list === flist);
      const showGeneral = flist === 'all' && refl.general && refl.general.trim();
      const filteredGeneral = flist === 'all' ? refl.general : '';
      const hasContent = (filteredGeneral && filteredGeneral.trim()) || sections.some(s => s.text && s.text.trim());
      if(hasContent){
        let rhtml = '';
        if(filteredGeneral && filteredGeneral.trim())
          rhtml += `<div class="refl-read-general">${esc(filteredGeneral)}</div>`;
        sections.filter(s => s.text && s.text.trim()).forEach(s => {
          rhtml += `<div class="refl-read-section">
            <div class="refl-read-label">${esc(s.list)}</div>
            <div class="refl-read-text">${esc(s.text)}</div>
          </div>`;
        });
        html += `<div class="j-card"><div class="j-card-header"><span class="j-card-title">Reflection</span><div class="j-edit-btn" onclick="showWriteScreen('${entry.date}')">✏ Edit</div></div>${rhtml}</div>`;
      }
    }

    return html || '<div class="book-empty">No entry for this day.</div>';
  }

  // ── Review screen state ───────────────────────────────────
  let reviewEntries    = [];

  let reviewPeriodIdx  = 0;       // 0 = current, -1 = previous, etc.

  // ── Period calculation ────────────────────────────────────
  function getPeriodDates(type, offset) {
    // offset: 0 = current, -1 = previous, +1 = next
    const today = new Date();
    let from, to;
    switch(type) {
      case 'week': {
        const day  = today.getDay();
        const diff = day === 0 ? 6 : day - 1;
        const mon  = new Date(today); mon.setDate(today.getDate() - diff + offset * 7);
        const sun  = new Date(mon);   sun.setDate(mon.getDate() + 6);
        from = isoDate(mon);
        to   = isoDate(sun > today && offset === 0 ? today : sun);
        break;
      }
      case 'month': {
        const y = today.getFullYear(), m = today.getMonth() + offset;
        const first = new Date(y, m, 1);
        const last  = new Date(y, m + 1, 0);
        from = isoDate(first);
        to   = isoDate(last > today && offset === 0 ? today : last);
        break;
      }
      case 'quarter': {
        const m = today.getMonth();
        const qStart = m < 3 ? 0 : m < 6 ? 3 : m < 9 ? 6 : 9;
        const qMon   = new Date(today.getFullYear(), qStart + offset * 3, 1);
        const qEnd   = new Date(qMon.getFullYear(), qMon.getMonth() + 3, 0);
        from = isoDate(qMon);
        to   = isoDate(qEnd > today && offset === 0 ? today : qEnd);
        break;
      }
      case 'year': {
        const y = today.getFullYear() + offset;
        from = isoDate(new Date(y, 0, 1));
        to   = isoDate(new Date(y, 11, 31) > today && offset === 0 ? today : new Date(y, 11, 31));
        break;
      }
    }
    return { from, to };
  }

  function getPeriodLabel(type, offset) {
    const today = new Date();
    switch(type) {
      case 'week': {
        const day  = today.getDay();
        const diff = day === 0 ? 6 : day - 1;
        const mon  = new Date(today); mon.setDate(today.getDate() - diff + offset * 7);
        // ISO week number
        const jan4  = new Date(mon.getFullYear(), 0, 4);
        const startOfWeek1 = new Date(jan4); startOfWeek1.setDate(jan4.getDate() - (jan4.getDay() || 7) + 1);
        const weekNum = Math.floor((mon - startOfWeek1) / (7 * 86400000)) + 1;
        return `${mon.getFullYear()} (Week ${weekNum})`;
      }
      case 'month': {
        const d = new Date(today.getFullYear(), today.getMonth() + offset, 1);
        return `${d.getFullYear()} (${d.toLocaleDateString('en-GB',{month:'long'})})`;
      }
      case 'quarter': {
        const m = today.getMonth();
        const qStart = m < 3 ? 0 : m < 6 ? 3 : m < 9 ? 6 : 9;
        const qMon   = new Date(today.getFullYear(), qStart + offset * 3, 1);
        const q      = Math.floor(qMon.getMonth() / 3) + 1;
        return `${qMon.getFullYear()} (Quarter ${q})`;
      }
      case 'year': {
        return `${today.getFullYear() + offset}`;
      }
    }
  }

  function getPeriodKey(type, offset) {
    // Unique key for storage: review:week:2026-W16 etc.
    const today = new Date();
    switch(type) {
      case 'week': {
        const day  = today.getDay();
        const diff = day === 0 ? 6 : day - 1;
        const mon  = new Date(today); mon.setDate(today.getDate() - diff + offset * 7);
        const jan4  = new Date(mon.getFullYear(), 0, 4);
        const startOfWeek1 = new Date(jan4); startOfWeek1.setDate(jan4.getDate() - (jan4.getDay() || 7) + 1);
        const weekNum = Math.floor((mon - startOfWeek1) / (7 * 86400000)) + 1;
        return `review:week:${mon.getFullYear()}-W${String(weekNum).padStart(2,'0')}`;
      }
      case 'month': {
        const d = new Date(today.getFullYear(), today.getMonth() + offset, 1);
        return `review:month:${isoDate(d).slice(0,7)}`;
      }
      case 'quarter': {
        const m = today.getMonth();
        const qStart = m < 3 ? 0 : m < 6 ? 3 : m < 9 ? 6 : 9;
        const qMon   = new Date(today.getFullYear(), qStart + offset * 3, 1);
        const q      = Math.floor(qMon.getMonth() / 3) + 1;
        return `review:quarter:${qMon.getFullYear()}-Q${q}`;
      }
      case 'year': {
        return `review:year:${today.getFullYear() + offset}`;
      }
    }
  }

  function updateHomePills(){ /* no-op */ }
  function onCustomDateChange(){ /* no-op */ }
  function onHomeRangeChange(){ loadHomeStats(); clearReviewDetail(); }

  function selectPeriod(type) {
    reviewPeriodType = type;
    reviewPeriodIdx  = 0;
    document.querySelectorAll('.review-period-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('period-' + type).classList.add('active');
    const dates = getPeriodDates(type, 0);
    document.getElementById('homeDateFrom').value = dates.from;
    document.getElementById('homeDateTo').value   = dates.to;
    clearReviewDetail();
    loadHomeStats();
  }

  async function loadHomeStats(){
    document.getElementById('homeStatsBody').innerHTML='<div class="empty-note">Loading…</div>';
    const from=document.getElementById('homeDateFrom').value;
    const to=document.getElementById('homeDateTo').value;
    if(!from||!to)return;
    try{const entries=await api('getEntries',{startDate:from,endDate:to});renderHomeStats(entries);}
    catch(e){document.getElementById('homeStatsBody').innerHTML=`<div class="empty-note" style="color:var(--red);">Error: ${e.message}</div>`;}
  }

  function renderHomeStats(entries){
    reviewEntries = entries;
    reviewActiveList = null;
    document.getElementById('reviewDetailCard').style.display = 'none';
    const counts={};let total=0;
    entries.forEach(entry=>{
      if(!entry.tasksText)return;
      parseTasksText(entry.tasksText).forEach(t=>{
        const list=LIST_OPTIONS.includes(t.list)?t.list:'Other';
        counts[list]=(counts[list]||0)+1;total++;
      });
    });
    if(!total){document.getElementById('homeStatsBody').innerHTML='<div class="empty-note">No tasks found in this date range.</div>';return;}
    const keys=Object.keys(counts).sort((a,b)=>{const ai=LIST_ORDER.indexOf(a),bi=LIST_ORDER.indexOf(b);if(ai===-1&&bi===-1)return a.localeCompare(b);if(ai===-1)return 1;if(bi===-1)return -1;return ai-bi;});
    const max=Math.max(...Object.values(counts));
    let html=keys.map(k=>
      `<div class="h-stat-row" id="stat-row-${k}" onclick="toggleReviewList('${k}')">
        <span class="h-list-name">${esc(k)}</span>
        <div class="h-bar-wrap"><div class="h-bar-fill" style="width:${Math.round(counts[k]/max*100)}%"></div></div>
        <span class="h-count">${counts[k].toLocaleString()}</span>
      </div>`
    ).join('');
    html+=`<hr class="h-rule"><div class="h-total-row"><span class="h-total-label">Total</span><span class="h-total-count">${total.toLocaleString()}</span></div>`;
    document.getElementById('homeStatsBody').innerHTML=html;
  }

  function clearReviewDetail() {
    document.getElementById('reviewDetailCard').style.display = 'none';
    if (reviewActiveList) {
      const row = document.getElementById('stat-row-' + reviewActiveList);
      if (row) row.classList.remove('active');
    }
    reviewActiveList = null;
  }

  function navigateReviewPeriod(dir) {
    reviewPeriodIdx += dir;
    const dates = getPeriodDates(reviewPeriodType, reviewPeriodIdx);
    document.getElementById('homeDateFrom').value = dates.from;
    document.getElementById('homeDateTo').value   = dates.to;
    loadHomeStats().then(() => {
      if (reviewActiveList) {
        toggleReviewList(reviewActiveList, true);
      }
    });
  }

  async function toggleReviewList(list, forceReload) {
    if (!forceReload && reviewActiveList === list) { clearReviewDetail(); return; }
    if (reviewActiveList && reviewActiveList !== list) {
      const prev = document.getElementById('stat-row-' + reviewActiveList);
      if (prev) prev.classList.remove('active');
    }
    reviewActiveList = list;
    const row = document.getElementById('stat-row-' + list);
    if (row) row.classList.add('active');

    // Update detail card header
    document.getElementById('reviewDetailList').textContent        = list;
    document.getElementById('reviewDetailPeriodLabel').textContent = getPeriodLabel(reviewPeriodType, reviewPeriodIdx);
    document.getElementById('reviewDetailBody').innerHTML = '<div class="empty-note"><span class="spin"></span> Loading…</div>';
    document.getElementById('reviewDetailCard').style.display = 'block';
    document.getElementById('reviewDetailCard').scrollIntoView({ behavior:'smooth', block:'start' });

    // Load period notes
    await loadReviewNotes(list);

    // Build task list
    const byDate = {};
    reviewEntries.forEach(entry => {
      if (!entry.tasksText) return;
      const tasks = parseTasksText(entry.tasksText).filter(t => (LIST_OPTIONS.includes(t.list)?t.list:'Other') === list);
      if (tasks.length) byDate[entry.date] = { tasks, entryId: entry.id, tasksText: entry.tasksText };
    });

    // Collect reflections
    const reflTexts = [];
    reviewEntries.forEach(entry => {
      if (!entry.reflection) return;
      const refl = reflectionParse(entry.reflection);
      if (refl.general && refl.general.trim()) reflTexts.push(refl.general.trim());
      (refl.sections||[]).filter(s=>s.list===list&&s.text&&s.text.trim()).forEach(s=>reflTexts.push(s.text.trim()));
    });

    // Render task list with star toggles
    const dates = Object.keys(byDate).sort((a,b)=>b.localeCompare(a));
    let taskHtml = '';
    if (!dates.length) {
      taskHtml = '<div class="empty-note">No tasks found.</div>';
    } else {
      taskHtml = dates.map(date => {
        const d = new Date(date+'T12:00:00');
        const dateStr = d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
        const items = byDate[date].tasks.map((t, ti) => {
          const starBtn = t.starred
            ? `<span class="review-star-btn" style="color:#b07030;cursor:pointer;" onclick="toggleReviewStar('${date}',${ti},true)">★</span>`
            : `<span class="review-star-btn" style="color:#c8b89a;cursor:pointer;" onclick="toggleReviewStar('${date}',${ti},false)">☆</span>`;
          return `<div class="review-task-item" id="rtask-${date}-${ti}">${starBtn} ${esc(t.title)}</div>`;
        }).join('');
        return `<div class="review-date-group"><div class="review-date-label">${esc(dateStr)}</div>${items}</div>`;
      }).join('');
    }

    // Show summary slot + tasks
    document.getElementById('reviewDetailBody').innerHTML =
      `<div id="reviewSummarySlot"><div class="empty-note" style="padding:8px 0;"><span class="spin"></span> Generating summary…</div></div>` +
      taskHtml;

    // Generate AI summary
    try {
      const allTasks = dates.flatMap(d => byDate[d].tasks.map(t => (t.starred?'★ ':'')+t.title));
      const summaryText = await generateListSummary(list, allTasks, reflTexts);
      document.getElementById('reviewSummarySlot').innerHTML =
        `<div class="review-summary">${esc(summaryText)}</div>`;
    } catch(e) {
      document.getElementById('reviewSummarySlot').innerHTML =
        `<div class="empty-note" style="color:var(--red);">Summary error: ${esc(e.message)}</div>`;
    }
  }

  async function toggleReviewStar(date, taskIdx, currentlyStarred) {
    // Find the entry and toggle the star
    const entry = reviewEntries.find(e => e.date === date);
    if (!entry) return;
    const tasks = parseTasksText(entry.tasksText);
    // Find this task among tasks for the active list
    const listTasks = tasks.filter(t=>(LIST_OPTIONS.includes(t.list)?t.list:'Other')===reviewActiveList);
    if (!listTasks[taskIdx]) return;
    const globalIdx = tasks.indexOf(listTasks[taskIdx]);
    tasks[globalIdx].starred = !currentlyStarred;
    // Rebuild tasksText
    const newTasksText = tasks.map(t=>{
      const list=LIST_OPTIONS.includes(t.list)?t.list:'Other';
      const star=t.starred?'★ ':'';
      return `• [${list}] ${star}${t.title}`;
    }).join('\n');
    entry.tasksText = newTasksText;
    // Update star button immediately
    const el = document.getElementById(`rtask-${date}-${taskIdx}`);
    if (el) {
      const newStar = !currentlyStarred;
      el.innerHTML = (newStar
        ? `<span class="review-star-btn" style="color:#b07030;cursor:pointer;" onclick="toggleReviewStar('${date}',${taskIdx},true)">★</span>`
        : `<span class="review-star-btn" style="color:#c8b89a;cursor:pointer;" onclick="toggleReviewStar('${date}',${taskIdx},false)">☆</span>`)
        + ' ' + esc(listTasks[taskIdx].title);
    }
    // Save to Notion
    try {
      await api('updateEntry', { pageId: entry.id, payload: { date: entry.date, tasksText: newTasksText, reflection: entry.reflection||'' } });
    } catch(e) { showStatus('homeStatus','Star save error: '+e.message,'err'); }
  }

  // ── Review period notes ───────────────────────────────────
  async function loadReviewNotes(list) {
    const key = getPeriodKey(reviewPeriodType, reviewPeriodIdx) + ':' + list;
    const box = document.getElementById('reviewNotesBox');
    const btn = document.getElementById('reviewNotesSaveBtn');
    box.value = ''; autoExpand(box);
    reviewNotesDirty = false; btn.style.display='none';
    try {
      const entry = await api('getEntryForDate', { date: key });
      if (entry && entry.reflection) { box.value = entry.reflection; autoExpand(box); }
    } catch(e) { /* no entry yet — blank is fine */ }
  }

  function onReviewNotesChange() {
    reviewNotesDirty = true;
    document.getElementById('reviewNotesSaveBtn').style.display = 'flex';
  }

  async function saveReviewNotes() {
    const key  = getPeriodKey(reviewPeriodType, reviewPeriodIdx) + ':' + reviewActiveList;
    const text = document.getElementById('reviewNotesBox').value.trim();
    const btn  = document.getElementById('reviewNotesSaveBtn');
    btn.innerHTML = '<span class="spin"></span> Saving…';
    try {
      // Check if entry exists
      const existing = await api('getEntryForDate', { date: key });
      if (existing) {
        await api('updateEntry', { pageId: existing.id, payload: { date: key, tasksText: '', reflection: text } });
      } else {
        await api('saveEntry', { payload: { date: key, tasksText: '', reflection: text } });
      }
      reviewNotesDirty = false; btn.style.display='none'; btn.textContent='Save';
      showStatus('reviewNotesSaveStatus','✓ Saved','ok');
      setTimeout(()=>document.getElementById('reviewNotesSaveStatus').innerHTML='',3000);
    } catch(e) { btn.textContent='Save'; showStatus('reviewNotesSaveStatus','Error: '+e.message,'err'); }
  }

  async function generateListSummary(list, tasks, reflections) {
    const from = document.getElementById('homeDateFrom').value;
    const to   = document.getElementById('homeDateTo').value;
    const fmt  = d => new Date(d+'T12:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});
    const dateRange = `${fmt(from)} to ${fmt(to)}`;
    return await api('generateListSummary', { list, tasks, reflections, dateRange });
  }


</script>
