<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tim's Journal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    :root {
      --bg:         #0d0d0d;
      --surface:    #171717;
      --surface2:   #202020;
      --border:     #2a2a2a;
      --text:       #e4e4e4;
      --muted:      #777;
      --accent:     #c8a96e;
      --accent-dim: rgba(200,169,110,0.12);
      --green:      #6eb87e;
      --green-dim:  rgba(110,184,126,0.12);
      --red:        #c87070;
      --red-dim:    rgba(200,112,112,0.12);
      /* Journal card colours */
      --card-bg:     #f5f0e8;
      --card-border: #ddd5c0;
      --card-bg2:    #ede8e0;
      --card-bg3:    #ece5d4;
      --card-text:   #3a2e1e;
      --card-muted:  #8a7a5a;
      --card-accent: #8a6030;
      --card-btn-bg: rgba(180,140,80,0.14);
      --card-btn-bd: rgba(180,140,80,0.4);
      --card-btn-color: #7a6040;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { overflow-x: hidden; max-width: 100vw; -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Jost', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Lock screen ── */
    #lockScreen {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 24px; padding: 32px; z-index: 999;
    }
    .lock-title { font-size: 28px; font-weight: 700; color: var(--accent); letter-spacing: 0.04em; }
    .lock-sub   { font-size: 13px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }
    #lockError  { font-size: 14px; color: var(--red); min-height: 20px; text-align: center; }

    /* ── Shared header ── */
    .j-header {
      background: var(--bg);
      padding: 14px 16px 0;
      position: sticky; top: 0; z-index: 30;
    }
    .j-title-row {
      font-size: 11px; font-weight: 600; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--muted);
      padding-bottom: 10px; border-bottom: 1px solid var(--border);
      margin-bottom: 10px;
    }
    .j-nav-row {
      display: flex; align-items: center; gap: 8px;
      padding-bottom: 10px; border-bottom: 1px solid var(--border);
    }
    .j-nav-btn {
      width: 34px; height: 34px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      background: var(--accent-dim);
      border: 1px solid rgba(200,169,110,0.45);
      border-radius: 8px; cursor: pointer;
      color: var(--accent); font-size: 20px; line-height: 1;
      user-select: none;
    }
    .j-nav-btn.text {
      width: auto; padding: 0 12px;
      font-size: 12px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase;
    }
    .j-nav-btn.disabled { opacity: 0.3; cursor: default; }
    .j-date-block { flex: 1; text-align: center; }
    .j-day-label  { font-size: 10px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 2px; }
    .j-date-label { font-size: 17px; font-weight: 700; color: var(--accent); white-space: nowrap; }
    .j-filter-btn {
      width: 34px; height: 34px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      background: var(--accent-dim); border: 1px solid rgba(200,169,110,0.45);
      border-radius: 8px; cursor: pointer; user-select: none;
    }
    .j-filter-lines { display: flex; flex-direction: column; gap: 3px; align-items: center; }
    .j-filter-line  { background: var(--accent); border-radius: 1px; height: 1.5px; }
    .j-filter-line:nth-child(1) { width: 14px; }
    .j-filter-line:nth-child(2) { width: 9px; }
    .j-filter-line:nth-child(3) { width: 5px; }

    /* Write-mode editing indicator */
    .j-editing-row {
      padding: 7px 0 10px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 6px;
    }
    .j-editing-label {
      font-size: 10px; font-weight: 600; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--muted);
    }
    .j-editing-icon { font-size: 12px; color: var(--muted); }

    /* ── Views ── */
    .view { display: none; padding: 14px 14px 60px; }
    .view.active { display: block; }

    /* ── Journal cards ── */
    .j-card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 12px; overflow: hidden; margin-bottom: 14px; }
    .j-card-header { display: flex; align-items: center; gap: 8px; padding: 10px 14px 8px; border-bottom: 1px solid var(--card-border); }
    .j-card-title { font-size: 10px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--card-muted); flex: 1; }
    .j-card-body  { padding: 10px 14px 12px; }

    .j-btn {
      display: flex; align-items: center; gap: 3px;
      font-size: 11px; color: var(--card-btn-color); font-family: 'Jost', sans-serif;
      background: var(--card-btn-bg); border: 1px solid var(--card-btn-bd);
      border-radius: 5px; padding: 4px 9px; cursor: pointer;
      white-space: nowrap; user-select: none; flex-shrink: 0;
    }
    .j-icon-btn {
      width: 26px; height: 26px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      background: var(--card-btn-bg); border: 1px solid var(--card-btn-bd);
      border-radius: 50%; cursor: pointer; color: var(--card-btn-color); font-size: 14px;
    }
    .j-edit-btn { display: flex; align-items: center; gap: 3px; font-size: 11px; color: var(--card-btn-color); font-family: 'Jost', sans-serif; background: var(--card-btn-bg); border: 1px solid var(--card-btn-bd); border-radius: 5px; padding: 4px 9px; cursor: pointer; user-select: none; }

    /* Task list inside cards */
    .j-list-label { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--card-accent); margin: 12px 0 4px; display: flex; align-items: center; justify-content: space-between; }
    .j-list-label:first-child { margin-top: 0; }
    .j-list-count { font-size: 10px; color: var(--card-muted); background: var(--card-bg3); border: 1px solid var(--card-border); border-radius: 4px; padding: 1px 6px; }
    .j-add-btn { font-size: 11px; color: var(--card-accent); background: rgba(180,140,80,0.1); border: 1px solid rgba(180,140,80,0.3); border-radius: 4px; padding: 2px 7px; cursor: pointer; font-family: 'Jost', sans-serif; user-select: none; }

    .j-task-row { display: flex; align-items: center; gap: 6px; padding: 5px 0; border-bottom: 1px solid rgba(0,0,0,0.06); }
    .j-task-row:last-child { border-bottom: none; }
    .j-drag-handle { color: #c8b89a; font-size: 14px; cursor: grab; flex-shrink: 0; user-select: none; -webkit-user-select: none; touch-action: none; }
    .j-task-list-pill { font-size: 11px; color: var(--card-muted); background: var(--card-bg3); border: 1px solid var(--card-border); border-radius: 5px; padding: 2px 6px; flex-shrink: 0; }
    .j-task-list-pill select { background: transparent; border: none; color: var(--card-accent); font-family: 'Jost', sans-serif; font-size: 11px; padding: 0; cursor: pointer; -webkit-appearance: none; }
    .j-task-title { flex: 1; font-size: 14px; color: var(--card-text); background: transparent; border: none; font-family: 'Jost', sans-serif; padding: 2px 0; min-width: 0; }
    .j-task-title:focus { outline: none; }
    .j-star-btn { background: none; border: none; font-size: 16px; cursor: pointer; flex-shrink: 0; padding: 0; line-height: 1; }
    .j-del-btn  { background: none; border: none; font-size: 14px; cursor: pointer; flex-shrink: 0; padding: 0; color: #bbb; line-height: 1; }

    .j-new-task-input { width: 100%; margin-top: 8px; background: var(--card-bg3); border: 1px solid var(--card-border); border-radius: 6px; padding: 7px 10px; font-size: 14px; color: var(--card-text); font-family: 'Jost', sans-serif; }
    .j-new-task-input:focus { outline: none; border-color: var(--card-accent); }
    .j-new-task-input::placeholder { color: var(--card-muted); font-style: italic; }

    /* Read task rows */
    .j-read-task { font-size: 15px; color: var(--card-text); line-height: 1.6; padding: 5px 0 5px 20px; position: relative; border-bottom: 1px solid rgba(0,0,0,0.06); font-family: 'Jost', sans-serif; }
    .j-read-task:last-child { border-bottom: none; }
    .j-read-task::before { content: '•'; position: absolute; left: 5px; color: var(--card-muted); }
    .j-read-star { color: #b07030; margin-right: 3px; font-size: 12px; }
    .j-reflection-text { font-size: 15px; color: var(--card-text); line-height: 1.9; white-space: pre-line; font-family: 'Jost', sans-serif; }

    /* Textarea */
    .j-textarea { width: 100%; min-height: 120px; background: var(--card-bg3); border: none; color: var(--card-text); font-family: 'Jost', sans-serif; font-size: 15px; line-height: 1.65; padding: 12px 14px; resize: vertical; display: block; }
    .j-textarea:focus { outline: none; }
    .j-textarea::placeholder { color: var(--card-muted); }

    /* Add strip */
    .j-add-strip { border-top: 1px solid var(--card-border); padding: 8px 14px; display: flex; gap: 8px; background: var(--card-bg2); }
    .j-strip-btn { flex: 1; padding: 8px 0; text-align: center; font-size: 12px; color: var(--card-btn-color); font-family: 'Jost', sans-serif; background: var(--card-btn-bg); border: 1px solid var(--card-btn-bd); border-radius: 7px; cursor: pointer; user-select: none; }

    /* Extracted tasks */
    .j-extracted { display: none; padding: 10px 14px; border-top: 1px solid var(--card-border); background: var(--card-bg3); }
    .j-extracted textarea { width: 100%; min-height: 80px; background: transparent; border: none; color: var(--card-text); font-family: 'Jost', sans-serif; font-size: 13px; line-height: 1.6; resize: none; }
    .j-extracted textarea:focus { outline: none; }
    .j-extracted-actions { display: flex; gap: 8px; margin-top: 8px; }

    /* Filter panel */
    .filter-panel { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 16px; }
    .filter-panel-inner { display: flex; flex-direction: column; gap: 12px; }
    .fp-row { display: flex; align-items: flex-end; gap: 10px; }
    .fp-label { font-size: 12px; color: var(--muted); display: flex; flex-direction: column; gap: 5px; flex: 1; font-family: 'Jost', sans-serif; letter-spacing: 0.04em; text-transform: uppercase; }
    .fp-label input, .fp-label select { font-size: 14px; padding: 8px 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'Jost', sans-serif; color-scheme: dark; -webkit-appearance: none; }

    /* Book page */
    .book-page { overflow: hidden; position: relative; min-height: calc(100dvh - 160px); }
    .book-content { padding: 16px 14px 60px; }

    /* Status */
    .status { font-size: 14px; padding: 10px 12px; border-radius: 8px; margin-top: 10px; line-height: 1.45; }
    .status.info { background: var(--accent-dim); color: var(--accent); }
    .status.ok   { background: var(--green-dim);  color: var(--green);  }
    .status.err  { background: var(--red-dim);    color: var(--red);    }

    /* Spinner */
    .spin { display: inline-block; width: 13px; height: 13px; border: 2px solid rgba(255,255,255,0.15); border-top-color: currentColor; border-radius: 50%; animation: rot 0.65s linear infinite; vertical-align: -2px; }
    @keyframes rot { to { transform: rotate(360deg); } }

    /* Drag over indicator */
    .j-task-row.drag-over { border-top: 2px solid var(--card-accent); }

    /* Date input */
    input[type="date"] { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'Jost', sans-serif; font-size: 15px; padding: 8px 12px; color-scheme: dark; -webkit-appearance: none; direction: ltr; text-align: left; }
    input[type="date"]::-webkit-date-and-time-value { text-align: left; }

    select { -webkit-appearance: none; }

    .empty-note { font-size: 14px; color: var(--card-muted); text-align: center; padding: 16px 0; font-style: italic; }
    .book-empty { text-align: center; color: var(--muted); font-size: 14px; padding: 60px 0; font-style: italic; }
  </style>
</head>
<body>

<!-- ══════════════ LOCK SCREEN ══════════════ -->
<div id="lockScreen">
  <div class="lock-title">Tim's Journal</div>
  <div class="lock-sub">Sign in to continue</div>
  <div id="googleSignInBtn"></div>
  <div id="lockError"></div>
</div>

<!-- ══════════════ READ VIEW ══════════════ -->
<section class="view" id="readView">

  <div class="j-header" id="readHeader">
    <div class="j-title-row">Tim's Journal</div>
    <div class="j-nav-row">
      <div class="j-nav-btn" id="prevDayBtn" onclick="navigateDay(-1)">‹</div>
      <div class="j-date-block">
        <div class="j-day-label"  id="readDayLabel"></div>
        <div class="j-date-label" id="readDateLabel"></div>
      </div>
      <div class="j-nav-btn" id="nextDayBtn" onclick="navigateDay(1)">›</div>
      <div class="j-filter-btn" onclick="toggleFilterPanel()">
        <div class="j-filter-lines">
          <div class="j-filter-line"></div>
          <div class="j-filter-line"></div>
          <div class="j-filter-line"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="filterPanel" class="filter-panel" style="display:none;">
    <div class="filter-panel-inner">
      <div class="fp-row">
        <label class="fp-label">Jump to
          <input type="date" id="filterJumpDate">
        </label>
        <div class="j-nav-btn text" onclick="jumpToDate()" style="height:auto;padding:8px 14px;font-size:13px;">Go</div>
      </div>
      <div class="fp-row">
        <label class="fp-label">Show
          <select id="filterField" onchange="bookField=this.value;renderBookPage(false);">
            <option value="all">Everything</option>
            <option value="tasks">Tasks only</option>
            <option value="starred">Starred tasks</option>
            <option value="reflection">Reflections only</option>
            <optgroup label="Tasks by list">
              <option value="list:Basic">Basic</option>
              <option value="list:Personal">Personal</option>
              <option value="list:Work">Work</option>
              <option value="list:Zipf">Zipf</option>
              <option value="list:Other">Other</option>
            </optgroup>
          </select>
        </label>
      </div>
    </div>
  </div>

  <div class="book-page">
    <div id="bookContent" class="book-content"></div>
  </div>
  <div id="bookStatus" style="padding:0 14px;"></div>

</section>

<!-- ══════════════ WRITE VIEW ══════════════ -->
<section class="view" id="writeView">

  <div class="j-header" id="writeHeader">
    <div class="j-title-row">Tim's Journal</div>
    <div class="j-nav-row">
      <div class="j-nav-btn" id="wPrevBtn" onclick="changeWriteDate(offsetDate(getWriteDate(),-1))">‹</div>
      <div class="j-date-block">
        <div class="j-day-label" id="writeDayLabel">✏ Editing</div>
        <div class="j-date-label" id="writeDateLabel"></div>
      </div>
      <div class="j-nav-btn" id="wNextBtn" onclick="changeWriteDate(offsetDate(getWriteDate(),1))">›</div>
      <div class="j-nav-btn text" onclick="exitToRead()">Exit</div>
    </div>
  </div>

  <!-- Completed tasks card -->
  <div style="padding:14px 14px 0;">
  <div class="j-card" id="tasksCard">
    <div class="j-card-header">
      <span class="j-card-title">Completed tasks</span>
      <div class="j-btn" id="tasksSaveBtn" style="display:none;" onclick="saveTasks()">Save</div>
      <div class="j-icon-btn" onclick="refreshTasks()" title="Reload from Notion">↻</div>
    </div>
    <div class="j-card-body" id="tasksDisplay">
      <div class="empty-note">Loading…</div>
    </div>
    <!-- Import strip -->
    <input type="file" id="screenshotInput" accept="image/*" multiple style="position:absolute;left:-9999px;width:1px;height:1px;opacity:0;">
    <input type="file" id="photoInput"      accept="image/*" style="position:absolute;left:-9999px;width:1px;height:1px;opacity:0;" onchange="handleReflectionPhoto(event)">
    <div class="j-add-strip">
      <div class="j-strip-btn" onclick="document.getElementById('screenshotInput').click()">📷 Screenshot</div>
      <div class="j-strip-btn" id="taskRecordBtn" onclick="toggleTaskRecording()">🎤 Record</div>
    </div>
    <div id="tasksImportStatus" style="padding:0 14px;"></div>
    <div class="j-extracted" id="tasksExtracted">
      <textarea id="extractedBox" placeholder="Extracted tasks will appear here…"></textarea>
      <div class="j-extracted-actions">
        <div class="j-btn" onclick="addExtractedTasks()">Add to tasks</div>
        <div class="j-btn" onclick="clearImport()">Clear</div>
      </div>
    </div>
    <div id="tasksSaveStatus" style="padding:0 14px;"></div>
  </div>

  <!-- Reflection card -->
  <div class="j-card" id="reflectionCard">
    <div class="j-card-header">
      <span class="j-card-title">Reflection</span>
      <div class="j-btn" id="reflectionSaveBtn" style="display:none;" onclick="saveReflection()">Save</div>
    </div>
    <textarea class="j-textarea" id="reflectionBox" placeholder="Write your reflection for today…" oninput="onReflectionChange()"></textarea>
    <div class="j-add-strip">
      <div class="j-strip-btn" onclick="document.getElementById('photoInput').click()">📷 Screenshot</div>
      <div class="j-strip-btn" id="reflectionRecordBtn" onclick="toggleReflectionRecording()">🎤 Record</div>
    </div>
    <div id="reflectionImportStatus" style="padding:0 14px;"></div>
    <div id="reflectionSaveStatus" style="padding:0 14px;"></div>
  </div>
  </div>

</section>

<script>
  // ── Config ────────────────────────────────────────────────
  const SCRIPT_URL      = 'https://script.google.com/macros/s/AKfycbxhwLpYwMqAI6IQaZEBueSkvpqaCGfb06uUsCK6cFYHjKK5tHBId3HVzS-U4Uq6o_kJ/exec';
  const GOOGLE_CLIENT_ID = '334749757917-t606nr5dfec4h2va1dah61nu9rm5rbk9.apps.googleusercontent.com';

  // ── State ─────────────────────────────────────────────────
  let idToken          = null;
  let tasksData        = [];
  let existingPageId   = null;
  let extractedTasks   = [];
  let tasksDirty       = false;
  let reflectionDirty  = false;
  let lastReadDate     = null; // date user was viewing before going to write

  // Book state
  let bookEntries      = [];
  let bookIndex        = 0;
  let bookField        = 'all';
  let bookLoadingMore  = false;
  let stepsInDir       = 0;
  let lastDir          = 0;

  // Voice state
  let taskRecognition  = null, taskVoiceTranscript = '', taskRecording = false;
  let reflRecognition  = null, reflVoiceTranscript = '', reflRecording = false;

  // ── Utilities ─────────────────────────────────────────────
  function isoDate(d) { return d.toISOString().split('T')[0]; }

  function getWriteDate() {
    return document.getElementById('writeDateLabel').dataset.date || isoDate(new Date());
  }

  function setWriteDate(dateStr) {
    const d = new Date(dateStr + 'T12:00:00');
    document.getElementById('writeDateLabel').dataset.date = dateStr;
    document.getElementById('writeDateLabel').textContent  =
      d.toLocaleDateString('en-GB', { day:'numeric', month:'long', year:'numeric' });
    document.getElementById('writeDayLabel').textContent = '✏ Editing';
  }

  function offsetDate(dateStr, days) {
    const d = new Date(dateStr + 'T12:00:00');
    d.setDate(d.getDate() + days);
    return isoDate(d);
  }

  // ── API ───────────────────────────────────────────────────
  async function api(action, params) {
    const res  = await fetch(SCRIPT_URL, {
      method: 'POST',
      body:   JSON.stringify({ action, params: params || {}, idToken }),
    });
    const text = await res.text();
    if (text.trim().startsWith('<')) throw new Error('Apps Script error — check deployment access.');
    const data = JSON.parse(text);
    if (!data.success) throw new Error(data.error);
    return data.data;
  }

  // ── Google Auth ───────────────────────────────────────────
  function initGoogleAuth() {
    google.accounts.id.initialize({
      client_id:   GOOGLE_CLIENT_ID,
      callback:    handleCredentialResponse,
      auto_select: true,
    });
    google.accounts.id.renderButton(
      document.getElementById('googleSignInBtn'),
      { theme:'outline', size:'large', text:'sign_in_with', shape:'pill' }
    );
    google.accounts.id.prompt();
  }

  function handleCredentialResponse(response) {
    idToken = response.credential;
    document.getElementById('lockScreen').style.display = 'none';
    initApp();
  }

  document.addEventListener('DOMContentLoaded', () => {
    const iv = setInterval(() => {
      if (window.google && google.accounts) { clearInterval(iv); initGoogleAuth(); }
    }, 100);
  });

  // ── Init — launch on Read screen ──────────────────────────
  function initApp() {
    document.getElementById('readView').classList.add('active');
    const todayStr = isoDate(new Date());
    document.getElementById('filterJumpDate').value = todayStr;
    document.getElementById('screenshotInput').addEventListener('change', function() {
      if (this.files && this.files.length) extractFromScreenshot();
    });
    loadReadView();
  }

  // ── WRITE SCREEN ──────────────────────────────────────────
  function showWriteScreen(date) {
    lastReadDate = bookEntries[bookIndex]?.date || isoDate(new Date());
    document.getElementById('readView').classList.remove('active');
    document.getElementById('writeView').classList.add('active');
    tasksData = []; existingPageId = null; tasksDirty = false; reflectionDirty = false;
    document.getElementById('tasksSaveBtn').style.display      = 'none';
    document.getElementById('reflectionSaveBtn').style.display = 'none';
    document.getElementById('reflectionBox').value = '';
    document.getElementById('tasksDisplay').innerHTML = '<div class="empty-note">Loading…</div>';
    setWriteDate(date);
    loadWriteEntry(date);
  }

  function exitToRead() {
    document.getElementById('writeView').classList.remove('active');
    document.getElementById('readView').classList.add('active');
    // Reload the entry we were viewing (may have been updated)
    const date = getWriteDate();
    const idx  = bookEntries.findIndex(e => e.date === date);
    if (idx >= 0) {
      bookIndex = idx;
      // Refresh that entry from Notion
      api('getEntryForDate', { date }).then(entry => {
        if (entry) {
          bookEntries[bookIndex].tasksText  = entry.tasksText;
          bookEntries[bookIndex].reflection = entry.reflection;
          existingPageId = entry.id;
        }
        renderBookPage(false);
      }).catch(() => renderBookPage(false));
    } else {
      renderBookPage(false);
    }
  }

  function changeWriteDate(dateStr) {
    tasksData = []; existingPageId = null; tasksDirty = false; reflectionDirty = false;
    document.getElementById('tasksSaveBtn').style.display      = 'none';
    document.getElementById('reflectionSaveBtn').style.display = 'none';
    document.getElementById('reflectionBox').value = '';
    setWriteDate(dateStr);
    loadWriteEntry(dateStr);
  }

  async function loadWriteEntry(date) {
    document.getElementById('tasksDisplay').innerHTML = '<div class="empty-note">Loading…</div>';
    try {
      const entry = await api('getEntryForDate', { date });
      if (entry) {
        existingPageId = entry.id;
        tasksData = parseTasksText(entry.tasksText);
        document.getElementById('reflectionBox').value = entry.reflection || '';
      } else {
        tasksData = [];
      }
      renderWriteTasks();
    } catch(e) {
      document.getElementById('tasksDisplay').innerHTML = '<div class="empty-note" style="color:var(--red);">Error loading entry.</div>';
    }
  }

  async function refreshTasks() {
    const date = getWriteDate();
    document.getElementById('tasksDisplay').innerHTML = '<div class="empty-note">Loading…</div>';
    try {
      const entry = await api('getEntryForDate', { date });
      if (entry) { tasksData = parseTasksText(entry.tasksText); existingPageId = entry.id; }
      else tasksData = [];
      tasksDirty = false;
      document.getElementById('tasksSaveBtn').style.display = 'none';
      renderWriteTasks();
    } catch(e) { showStatus('tasksSaveStatus', 'Error: ' + e.message, 'err'); }
  }

  // ── Tasks rendering ───────────────────────────────────────
  const LIST_ORDER   = ['Basic', 'Personal', 'Work', 'Zipf'];
  const LIST_OPTIONS = ['—', 'Basic', 'Personal', 'Work', 'Zipf', 'Other'];

  function parseTasksText(text) {
    if (!text) return [];
    return text.split('\n').map(l => {
      const line = l.replace(/^•\s*/, '').trim();
      const m    = line.match(/^\[(.+?)\]\s+(★\s+)?(.+)$/);
      if (m) return { list: m[1], starred: !!m[2], title: m[3] };
      const starred = line.startsWith('★ ');
      return { list: '—', starred, title: starred ? line.slice(2) : line };
    }).filter(t => t.title);
  }

  function tasksAsText() {
    return tasksData.map(t => {
      const list  = t.list  || '—';
      const star  = t.starred ? '★ ' : '';
      return list !== '—' ? `• [${list}] ${star}${t.title}` : `• ${star}${t.title}`;
    }).join('\n');
  }

  function groupByList(tasks) {
    const groups = {};
    tasks.forEach((t, i) => {
      const list = t.list || '—';
      if (!groups[list]) groups[list] = [];
      groups[list].push({ ...t, idx: i });
    });
    const keys = Object.keys(groups).sort((a, b) => {
      const ai = LIST_ORDER.indexOf(a), bi = LIST_ORDER.indexOf(b);
      if (ai === -1 && bi === -1) return a.localeCompare(b);
      if (ai === -1) return 1; if (bi === -1) return -1;
      return ai - bi;
    });
    return keys.map(k => ({ list: k, items: groups[k] }));
  }

  function renderWriteTasks() {
    const display = document.getElementById('tasksDisplay');
    if (!tasksData.length) {
      display.innerHTML = '<div class="empty-note">No tasks yet — add one below.</div>';
      return;
    }
    const groups = groupByList(tasksData);
    const withH  = groups.length > 1 || (groups.length === 1 && groups[0].list !== '—');
    let html = '';
    groups.forEach(g => {
      if (withH && g.list !== '—') {
        html += `<div class="j-list-label">
          <span>${esc(g.list)}</span>
          <div class="j-add-btn" onclick="addTaskToList('${esc(g.list)}')">+ Add</div>
        </div>`;
      }
      g.items.forEach(item => {
        const opts = LIST_OPTIONS.map(l => `<option value="${l}"${l === item.list ? ' selected':''}>${l}</option>`).join('');
        html += `<div class="j-task-row" data-idx="${item.idx}">
          <span class="j-drag-handle">⠿</span>
          <div class="j-task-list-pill"><select onchange="updateTaskList(${item.idx},this.value)">${opts}</select></div>
          <input class="j-task-title" type="text" value="${esc(item.title)}" onchange="updateTaskTitle(${item.idx},this.value)" oninput="markTasksDirty()">
          <button class="j-star-btn" onclick="toggleStar(${item.idx})" style="color:${item.starred?'#c8a96e':'#c8b89a'}">${item.starred?'★':'☆'}</button>
          <button class="j-del-btn"  onclick="deleteTask(${item.idx})">✕</button>
        </div>`;
      });
    });
    // If only one list, add a global "+ Add" at the bottom
    if (!withH) {
      html += `<div class="j-add-btn" style="margin-top:8px;display:inline-block;" onclick="addTaskToList('—')">+ Add task</div>`;
    }
    display.innerHTML = html;
    bindDrag();
  }

  function addTaskToList(list) {
    // Insert a new empty task at end of this list's items
    const existing = tasksData.filter(t => (t.list||'—') === list);
    const lastIdx  = tasksData.lastIndexOf(tasksData.filter(t=>(t.list||'—')===list).slice(-1)[0]);
    const insertAt = lastIdx >= 0 ? lastIdx + 1 : tasksData.length;
    tasksData.splice(insertAt, 0, { list, starred: false, title: '' });
    renderWriteTasks();
    markTasksDirty();
    // Focus the new input
    const inputs = document.querySelectorAll('.j-task-title');
    if (inputs[insertAt]) inputs[insertAt].focus();
  }

  function markTasksDirty() {
    tasksDirty = true;
    document.getElementById('tasksSaveBtn').style.display = 'flex';
  }

  function onReflectionChange() {
    reflectionDirty = true;
    document.getElementById('reflectionSaveBtn').style.display = 'flex';
  }

  function updateTaskTitle(i, v) { if (tasksData[i]) { tasksData[i].title = v.trim(); markTasksDirty(); } }
  function updateTaskList(i, v)  { if (tasksData[i]) { tasksData[i].list  = v; markTasksDirty(); renderWriteTasks(); } }
  function deleteTask(i)         { tasksData.splice(i, 1); markTasksDirty(); renderWriteTasks(); }
  function toggleStar(i) {
    if (!tasksData[i]) return;
    tasksData[i].starred = !tasksData[i].starred;
    markTasksDirty(); renderWriteTasks();
  }

  // ── Save tasks ────────────────────────────────────────────
  async function saveTasks() {
    const btn = document.getElementById('tasksSaveBtn');
    btn.textContent = 'Saving…';
    const payload = { date: getWriteDate(), tasksText: tasksAsText(), reflection: document.getElementById('reflectionBox').value.trim() };
    try {
      if (existingPageId) {
        await api('updateEntry', { pageId: existingPageId, payload });
      } else {
        const r = await api('saveEntry', { payload });
        existingPageId = r.id;
      }
      tasksDirty = false;
      btn.style.display = 'none';
      showStatus('tasksSaveStatus', '✓ Saved', 'ok');
      autoClear('tasksSaveStatus', 3000);
    } catch(e) {
      btn.textContent = 'Save';
      showStatus('tasksSaveStatus', 'Error: ' + e.message, 'err');
    }
  }

  // ── Save reflection ───────────────────────────────────────
  async function saveReflection() {
    const btn = document.getElementById('reflectionSaveBtn');
    btn.textContent = 'Saving…';
    const payload = { date: getWriteDate(), tasksText: tasksAsText(), reflection: document.getElementById('reflectionBox').value.trim() };
    try {
      if (existingPageId) {
        await api('updateEntry', { pageId: existingPageId, payload });
      } else {
        const r = await api('saveEntry', { payload });
        existingPageId = r.id;
      }
      reflectionDirty = false;
      btn.style.display = 'none';
      showStatus('reflectionSaveStatus', '✓ Saved', 'ok');
      autoClear('reflectionSaveStatus', 3000);
    } catch(e) {
      btn.textContent = 'Save';
      showStatus('reflectionSaveStatus', 'Error: ' + e.message, 'err');
    }
  }

  // ── Drag and drop ─────────────────────────────────────────
  function bindDrag() {
    const display = document.getElementById('tasksDisplay');
    let dragIdx = null;
    display.querySelectorAll('.j-task-row').forEach(row => {
      row.setAttribute('draggable', 'true');
      row.addEventListener('dragstart', () => { dragIdx = parseInt(row.dataset.idx); setTimeout(() => row.style.opacity='0.4',0); });
      row.addEventListener('dragend',   () => { row.style.opacity=''; display.querySelectorAll('.j-task-row').forEach(r=>r.classList.remove('drag-over')); dragIdx=null; });
      row.addEventListener('dragover',  e => { e.preventDefault(); display.querySelectorAll('.j-task-row').forEach(r=>r.classList.remove('drag-over')); row.classList.add('drag-over'); });
      row.addEventListener('drop',      e => {
        e.preventDefault();
        const ti = parseInt(row.dataset.idx);
        if (dragIdx===null||dragIdx===ti) return;
        const item = tasksData.splice(dragIdx,1)[0];
        tasksData.splice(dragIdx<ti?ti-1:ti,0,item);
        markTasksDirty(); renderWriteTasks();
      });
      const handle = row.querySelector('.j-drag-handle');
      if (!handle) return;
      let startY=0;
      handle.addEventListener('touchstart', e=>{e.preventDefault();dragIdx=parseInt(row.dataset.idx);startY=e.touches[0].clientY;row.style.opacity='0.4';},{passive:false});
      handle.addEventListener('touchmove',  e=>{e.preventDefault();const y=e.touches[0].clientY;display.querySelectorAll('.j-task-row').forEach(r=>{const rect=r.getBoundingClientRect();if(y>=rect.top&&y<=rect.bottom&&parseInt(r.dataset.idx)!==dragIdx){display.querySelectorAll('.j-task-row').forEach(x=>x.classList.remove('drag-over'));r.classList.add('drag-over');}});},{passive:false});
      handle.addEventListener('touchend',   e=>{e.preventDefault();row.style.opacity='';let tr=null;display.querySelectorAll('.j-task-row').forEach(r=>{if(r.classList.contains('drag-over'))tr=r;r.classList.remove('drag-over');});if(tr&&dragIdx!==null){const ti=parseInt(tr.dataset.idx);const item=tasksData.splice(dragIdx,1)[0];tasksData.splice(dragIdx<ti?ti-1:ti,0,item);markTasksDirty();renderWriteTasks();}dragIdx=null;},{passive:false});
    });
  }

  // ── Screenshot extraction ─────────────────────────────────
  function clearImport() {
    document.getElementById('screenshotInput').value = '';
    document.getElementById('tasksExtracted').style.display = 'none';
    document.getElementById('tasksImportStatus').innerHTML  = '';
    extractedTasks = [];
  }

  async function extractFromScreenshot() {
    const input = document.getElementById('screenshotInput');
    const files = Array.from(input.files || []);
    if (!files.length) return;
    extractedTasks = [];
    document.getElementById('tasksExtracted').style.display = 'none';
    try {
      for (let i = 0; i < files.length; i++) {
        showStatus('tasksImportStatus', `<span class="spin"></span> Extracting from image ${i+1} of ${files.length}…`, 'info');
        const b64 = await toBase64(files[i]);
        const extracted = await api('extractTasksFromImage', { base64Data: b64, mediaType: files[i].type||'image/jpeg' });
        extractedTasks = extractedTasks.concat(extracted||[]);
      }
      input.value = '';
      if (!extractedTasks.length) { showStatus('tasksImportStatus','No completed tasks found.','err'); return; }
      document.getElementById('extractedBox').value = extractedTasks.map(t=>(t.list&&t.list!=='—')?`[${t.list}] ${t.title}`:t.title).join('\n');
      document.getElementById('tasksExtracted').style.display = 'block';
      document.getElementById('tasksImportStatus').innerHTML = '';
    } catch(e) { showStatus('tasksImportStatus','Error: '+e.message,'err'); }
  }

  function addExtractedTasks() {
    const existing = new Set(tasksData.map(t=>t.title.toLowerCase()));
    extractedTasks.forEach(t => {
      if (!existing.has(t.title.trim().toLowerCase())) {
        tasksData.push({ title: t.title.trim(), list: t.list||'—', starred: false });
        existing.add(t.title.trim().toLowerCase());
      }
    });
    markTasksDirty(); renderWriteTasks(); clearImport();
  }

  // ── Task voice recording ──────────────────────────────────
  function toggleTaskRecording() { taskRecording ? stopTaskRecording() : startTaskRecording(); }

  function startTaskRecording() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { showStatus('tasksImportStatus','Voice not supported.','err'); return; }
    taskRecognition = new SR(); taskRecognition.lang='en-GB'; taskRecognition.continuous=true; taskRecognition.interimResults=true;
    taskVoiceTranscript=''; taskRecording=true;
    document.getElementById('taskRecordBtn').textContent='⏹ Stop';
    showStatus('tasksImportStatus','🔴 Recording — tap Stop when done','info');
    taskRecognition.onresult=e=>{let t='';for(let i=0;i<e.results.length;i++)t+=e.results[i][0].transcript;taskVoiceTranscript=t;};
    taskRecognition.onerror=e=>{stopTaskRecording();showStatus('tasksImportStatus','Error: '+e.error,'err');};
    taskRecognition.onend=()=>{if(taskRecording)stopTaskRecording();};
    taskRecognition.start();
  }

  function stopTaskRecording() {
    taskRecording=false; if(taskRecognition){try{taskRecognition.stop();}catch(e){}}
    document.getElementById('taskRecordBtn').textContent='🎤 Record';
    if(taskVoiceTranscript) { showStatus('tasksImportStatus','<span class="spin"></span> Analysing…','info'); extractFromVoice(); }
    else document.getElementById('tasksImportStatus').innerHTML='';
  }

  async function extractFromVoice() {
    try {
      const extracted = await api('extractTasksFromTranscript', { transcript: taskVoiceTranscript });
      if (!extracted||!extracted.length){showStatus('tasksImportStatus','No tasks found.','err');return;}
      extractedTasks=extracted;
      document.getElementById('extractedBox').value=extracted.map(t=>(t.list&&t.list!=='—')?`[${t.list}] ${t.title}`:t.title).join('\n');
      document.getElementById('tasksExtracted').style.display='block';
      document.getElementById('tasksImportStatus').innerHTML='';
    } catch(e){showStatus('tasksImportStatus','Error: '+e.message,'err');}
  }

  // ── Reflection photo OCR ──────────────────────────────────
  async function handleReflectionPhoto(e) {
    const file = e.target.files[0]; if(!file) return;
    showStatus('reflectionImportStatus','<span class="spin"></span> Transcribing…','info');
    try {
      const text = await api('ocrImage', { base64Data: await toBase64(file), mediaType: file.type||'image/jpeg' });
      const box  = document.getElementById('reflectionBox');
      box.value  = box.value ? box.value+'\n\n'+text : text;
      onReflectionChange();
      showStatus('reflectionImportStatus','✓ Added to reflection','ok');
      setTimeout(()=>document.getElementById('reflectionImportStatus').innerHTML='',4000);
    } catch(e){showStatus('reflectionImportStatus','Error: '+e.message,'err');}
    e.target.value='';
  }

  // ── Reflection voice recording ────────────────────────────
  function toggleReflectionRecording(){reflRecording?stopReflRecording():startReflRecording();}

  function startReflRecording(){
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){showStatus('reflectionImportStatus','Voice not supported.','err');return;}
    reflRecognition=new SR();reflRecognition.lang='en-GB';reflRecognition.continuous=true;reflRecognition.interimResults=true;
    reflVoiceTranscript='';reflRecording=true;
    document.getElementById('reflectionRecordBtn').textContent='⏹ Stop';
    showStatus('reflectionImportStatus','🔴 Recording — tap Stop when done','info');
    reflRecognition.onresult=e=>{let f='',interim='';for(let i=0;i<e.results.length;i++){if(e.results[i].isFinal)f+=e.results[i][0].transcript+' ';else interim+=e.results[i][0].transcript;}reflVoiceTranscript=f+interim;};
    reflRecognition.onerror=e=>{stopReflRecording();showStatus('reflectionImportStatus','Error: '+e.error,'err');};
    reflRecognition.onend=()=>{if(reflRecording)stopReflRecording();};
    reflRecognition.start();
  }

  function stopReflRecording(){
    reflRecording=false;if(reflRecognition){try{reflRecognition.stop();}catch(e){}}
    document.getElementById('reflectionRecordBtn').textContent='🎤 Record';
    if(reflVoiceTranscript.trim()){
      const box=document.getElementById('reflectionBox');
      box.value=box.value?box.value+'\n\n'+reflVoiceTranscript.trim():reflVoiceTranscript.trim();
      onReflectionChange();
      showStatus('reflectionImportStatus','✓ Added to reflection','ok');
      setTimeout(()=>document.getElementById('reflectionImportStatus').innerHTML='',3000);
    } else document.getElementById('reflectionImportStatus').innerHTML='';
  }

  // ── READ SCREEN ───────────────────────────────────────────
  async function loadReadView() {
    showStatus('bookStatus','<span class="spin"></span> Loading journal…','info');
    bookEntries=[]; bookIndex=0; stepsInDir=0; lastDir=0;
    try {
      const today=new Date(), monthAgo=new Date(today);
      monthAgo.setDate(today.getDate()-30);
      const entries=await api('getEntries',{startDate:isoDate(monthAgo),endDate:isoDate(today)});
      document.getElementById('bookStatus').innerHTML='';
      bookEntries=entries.filter(e=>e.date);
      bookIndex=0; renderBookPage(false);
    } catch(e){showStatus('bookStatus','Error: '+e.message,'err');}
  }

  async function loadMoreEntries(direction) {
    if(bookLoadingMore||!bookEntries.length) return;
    bookLoadingMore=true;
    try {
      if(direction===-1){
        const oldest=bookEntries[bookEntries.length-1].date;
        const end=new Date(oldest+'T12:00:00');end.setDate(end.getDate()-1);
        const start=new Date(end);start.setDate(start.getDate()-30);
        const more=await api('getEntries',{startDate:isoDate(start),endDate:isoDate(end)});
        if(more&&more.length) bookEntries=bookEntries.concat(more.filter(e=>e.date));
      } else {
        const newest=bookEntries[0].date;
        const start=new Date(newest+'T12:00:00');start.setDate(start.getDate()+1);
        const more=await api('getEntries',{startDate:isoDate(start),endDate:isoDate(new Date())});
        if(more&&more.length){bookEntries=more.filter(e=>e.date).concat(bookEntries);bookIndex+=more.length;}
      }
    } catch(e){}
    bookLoadingMore=false; updateNavBtns();
  }

  function renderBookPage(animate, direction) {
    const content = document.getElementById('bookContent');
    const entry   = bookEntries[bookIndex];
    updateNavBtns();

    if (entry) {
      const d = new Date(entry.date+'T12:00:00');
      document.getElementById('readDayLabel').textContent  = d.toLocaleDateString('en-GB',{weekday:'long'});
      document.getElementById('readDateLabel').textContent = d.toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});
    } else {
      document.getElementById('readDayLabel').textContent  = '';
      document.getElementById('readDateLabel').textContent = '';
    }

    if (animate) {
      content.style.transition='opacity 0.18s ease, transform 0.18s ease';
      content.style.opacity='0';
      content.style.transform=`translateX(${direction===1?'-30px':'30px'})`;
    }

    setTimeout(()=>{
      content.innerHTML = entry ? buildPageHTML(entry) : '<div class="book-empty">No entry for this day.</div>';
      const from = direction===1?'30px':'-30px';
      content.style.transition='none'; content.style.opacity='0';
      content.style.transform=animate?`translateX(${from})`:'translateX(0)';
      requestAnimationFrame(()=>requestAnimationFrame(()=>{
        content.style.transition='opacity 0.22s ease, transform 0.22s ease';
        content.style.opacity='1'; content.style.transform='translateX(0)';
      }));
    }, animate?180:0);
  }

  function updateNavBtns() {
    const prev=document.getElementById('prevDayBtn'), next=document.getElementById('nextDayBtn');
    if(prev){if(bookIndex>=bookEntries.length-1)prev.classList.add('disabled');else prev.classList.remove('disabled');}
    if(next){if(bookIndex<=0)next.classList.add('disabled');else next.classList.remove('disabled');}
  }

  function buildPageHTML(entry) {
    const field=bookField; let html='';
    if((field==='all'||field==='tasks'||field==='starred'||field.startsWith('list:'))&&entry.tasksText){
      let taskObjs=parseTasksText(entry.tasksText);
      if(field==='starred') taskObjs=taskObjs.filter(t=>t.starred);
      else if(field.startsWith('list:')){const ln=field.slice(5);taskObjs=ln==='Other'?taskObjs.filter(t=>LIST_ORDER.indexOf(t.list)===-1&&t.list!=='—'):taskObjs.filter(t=>t.list===ln);}
      if(taskObjs.length){
        const groups=groupByList(taskObjs);
        const withH=!field.startsWith('list:')&&field!=='starred'&&(groups.length>1||(groups.length===1&&groups[0].list!=='—'));
        let inner='';
        groups.forEach(g=>{
          if(withH&&g.list!=='—') inner+=`<div class="j-list-label"><span>${esc(g.list)}</span><span class="j-list-count">+${g.items.length}</span></div>`;
          g.items.forEach(t=>{const star=t.starred?`<span class="j-read-star">★</span>`:'';inner+=`<div class="j-read-task">${star}${esc(t.title)}</div>`;});
        });
        html+=`<div class="j-card"><div class="j-card-header"><span class="j-card-title">Completed tasks</span><div class="j-edit-btn" onclick="showWriteScreen('${entry.date}')">✏ Edit</div></div><div class="j-card-body">${inner}</div></div>`;
      }
    }
    if((field==='all'||field==='reflection')&&!field.startsWith('list:')&&field!=='starred'&&entry.reflection){
      html+=`<div class="j-card"><div class="j-card-header"><span class="j-card-title">Reflection</span><div class="j-edit-btn" onclick="showWriteScreen('${entry.date}')">✏ Edit</div></div><div class="j-card-body"><div class="j-reflection-text">${esc(entry.reflection)}</div></div></div>`;
    }
    return html||'<div class="book-empty">No entry for this day.</div>';
  }

  function navigateDay(direction) {
    // direction: -1 = go to older (higher index), +1 = go to newer (lower index)
    const next = bookIndex + (direction === 1 ? -1 : 1);
    if(next<0||next>=bookEntries.length) return;
    bookIndex=next; renderBookPage(true, direction);
    if(direction===lastDir) stepsInDir++; else{stepsInDir=1;lastDir=direction;}
    if(stepsInDir>=7){stepsInDir=0;loadMoreEntries(direction<0?-1:1);}
  }

  function jumpToDate() {
    const dateStr=document.getElementById('filterJumpDate').value;
    if(!dateStr) return;
    const idx=bookEntries.findIndex(e=>e.date<=dateStr);
    bookIndex=idx>=0?idx:bookEntries.length-1;
    stepsInDir=0;lastDir=0;toggleFilterPanel();renderBookPage(false);
  }

  function toggleFilterPanel(){
    const p=document.getElementById('filterPanel');
    p.style.display=p.style.display==='none'?'block':'none';
  }

  // ── Swipe gestures ────────────────────────────────────────
  (function(){
    let sx=0,sy=0;
    document.addEventListener('touchstart',e=>{if(!document.getElementById('readView').classList.contains('active'))return;sx=e.touches[0].clientX;sy=e.touches[0].clientY;},{passive:true});
    document.addEventListener('touchend',e=>{if(!document.getElementById('readView').classList.contains('active'))return;const dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;if(Math.abs(dx)<40||Math.abs(dy)>Math.abs(dx))return;navigateDay(dx<0?-1:1);},{passive:true});
  })();

  // ── Helpers ───────────────────────────────────────────────
  function toBase64(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file);});}
  function showStatus(id,msg,type){const el=document.getElementById(id);if(el)el.innerHTML=`<div class="status ${type}" style="margin:8px 0;">${msg}</div>`;}
  function autoClear(id,ms){setTimeout(()=>{const el=document.getElementById(id);if(el)el.innerHTML='';},ms);}
  function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
</script>
