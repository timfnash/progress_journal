<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tim's Journal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600;700&family=Caveat:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    :root {
      --bg:         #0d0d0d;
      --surface:    #171717;
      --surface2:   #202020;
      --border:     #2a2a2a;
      --text:       #e4e4e4;
      --muted:      #777;
      --accent:     #c8a96e;
      --accent-dim: rgba(200,169,110,0.12);
      --green:      #6eb87e;
      --green-dim:  rgba(110,184,126,0.12);
      --red:        #c87070;
      --red-dim:    rgba(200,112,112,0.12);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { overflow-x: hidden; max-width: 100vw; -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }

    body {
      background: var(--bg); color: var(--text);
      font-family: 'Jost', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100dvh; padding-bottom: 82px;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Lock screen ── */
    #lockScreen {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 24px; padding: 32px; z-index: 999;
    }
    .lock-title { font-size: 28px; font-weight: 700; color: var(--accent); letter-spacing: 0.04em; }
    .lock-sub   { font-size: 13px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }
    #lockError  { font-size: 14px; color: var(--red); min-height: 20px; text-align: center; }

    /* ── Header ── */
    .header {
      padding: 24px 16px 16px; border-bottom: 1px solid var(--border);
      position: sticky; top: 0; background: var(--bg); z-index: 30;
    }
    .header h1 { font-size: 30px; font-weight: 700; letter-spacing: 0.04em; color: var(--accent); }
    .header .today { font-size: 17px; color: var(--muted); margin-top: 6px; }

    /* ── Tab toggle ── */
    .tab-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      display: flex; justify-content: flex-start; align-items: center;
      background: var(--surface); border-top: 1px solid var(--border);
      padding: 12px 12px 16px; z-index: 40;
    }
    .tab-toggle {
      display: inline-flex; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 10px;
      overflow: hidden; width: 200px;
    }
    .tab-btn {
      flex: 1; padding: 9px 0; background: none; border: none;
      color: var(--muted); font-size: 14px; font-weight: 500;
      font-family: 'Jost', sans-serif; letter-spacing: 0.05em; text-transform: uppercase;
      cursor: pointer; transition: all 0.15s; text-align: center;
    }
    .tab-btn.active { background: var(--accent); color: #111; border-radius: 8px; }

    /* ── Views ── */
    .view { display: none; padding: 14px 12px 0; }
    .view.active { display: block; }

    /* ── Card ── */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 14px; }
    .card-label { font-size: 12px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 13px 22px; border-radius: 10px; border: none;
      font-size: 16px; font-weight: 500; font-family: 'Jost', sans-serif;
      cursor: pointer; transition: opacity 0.15s; white-space: nowrap; max-width: 100%;
    }
    .btn:disabled { opacity: 0.38; cursor: default; }
    .btn-primary  { background: var(--accent); color: #111; }
    .btn-outline  { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .action-btn   { width: 200px; }

    /* ── Task rows ── */
    .task-row { font-size: 15px; color: var(--text); padding: 6px 0 6px 16px; position: relative; line-height: 1.45; border-bottom: 1px solid var(--border); }
    .task-row:last-child { border-bottom: none; }
    .task-row::before { content: '•'; position: absolute; left: 4px; color: var(--text); }
    .empty-note { font-size: 15px; color: var(--muted); text-align: center; padding: 16px 0; }

    /* ── Textarea ── */
    textarea {
      width: 100%; min-height: 130px; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 10px;
      color: var(--text); font-family: 'Jost', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 16px; line-height: 1.65; padding: 14px; resize: vertical;
    }
    textarea:focus { outline: none; border-color: var(--accent); }
    textarea::placeholder { color: var(--muted); }

    /* ── Inputs ── */
    input[type="text"] {
      background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); font-family: 'Jost', sans-serif; font-size: 15px; padding: 10px 12px;
    }
    input[type="text"]:focus { outline: none; border-color: var(--accent); }
    input[type="text"]::placeholder { color: var(--muted); }

    input[type="date"], select {
      background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); font-family: 'Jost', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 15px; padding: 10px 12px; width: 100%; display: block;
      direction: ltr; text-align: left; -webkit-appearance: none; appearance: none; color-scheme: dark;
    }
    input[type="date"]::-webkit-date-and-time-value { text-align: left; }
    input[type="date"]:focus, select:focus { outline: none; border-color: var(--accent); }

    /* ── Photo row ── */
    .photo-row { display: flex; align-items: center; gap: 10px; }
    .photo-name { font-size: 15px; color: var(--muted); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }

    /* ── Status ── */
    .status { font-size: 15px; padding: 11px 14px; border-radius: 8px; margin-top: 12px; line-height: 1.45; }
    .status.info { background: var(--accent-dim); color: var(--accent); }
    .status.ok   { background: var(--green-dim);  color: var(--green);  }
    .status.err  { background: var(--red-dim);    color: var(--red);    }

    /* ── Spinner ── */
    .spin {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.15); border-top-color: currentColor;
      border-radius: 50%; animation: rot 0.65s linear infinite; vertical-align: -2px;
    }
    @keyframes rot { to { transform: rotate(360deg); } }

    /* ── Filter stack ── */
    .filter-stack { display: flex; flex-direction: column; gap: 10px; margin-bottom: 12px; }
    .filter-stack label, .field-label { font-size: 13px; color: var(--muted); display: flex; flex-direction: column; gap: 6px; }

    /* ── Book read view ── */
    .book-header {
      background: var(--bg);
      padding: 14px 16px 0;
      position: sticky; top: 0; z-index: 20;
    }
    .book-title-row {
      font-size: 11px; font-weight: 600; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--muted);
      padding-bottom: 10px; border-bottom: 1px solid var(--border);
      margin-bottom: 10px;
    }
    .book-nav-row {
      display: flex; align-items: center; gap: 8px;
      padding-bottom: 12px; border-bottom: 1px solid var(--border);
    }
    .book-nav-btn {
      width: 34px; height: 34px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(200,169,110,0.15);
      border: 1px solid rgba(200,169,110,0.45);
      border-radius: 8px; cursor: pointer;
      color: var(--accent); font-size: 20px; line-height: 1;
      user-select: none;
    }
    .book-nav-btn:disabled, .book-nav-btn.disabled { opacity: 0.3; cursor: default; }
    .book-date-block { flex: 1; text-align: center; }
    .book-day-sub-nav { font-size: 10px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 2px; }
    .book-date-nav-label { font-size: 17px; font-weight: 700; color: var(--accent); white-space: nowrap; }
    .book-filter-btn {
      width: 34px; height: 34px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(200,169,110,0.15);
      border: 1px solid rgba(200,169,110,0.45);
      border-radius: 8px; cursor: pointer; user-select: none;
    }
    .book-filter-lines { display: flex; flex-direction: column; gap: 3px; align-items: center; }
    .book-filter-line { background: var(--accent); border-radius: 1px; height: 1.5px; }
    .book-filter-line:nth-child(1) { width: 14px; }
    .book-filter-line:nth-child(2) { width: 9px; }
    .book-filter-line:nth-child(3) { width: 5px; }

    .filter-panel { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 16px; }
    .filter-panel-inner { display: flex; flex-direction: column; gap: 12px; }
    .fp-row { display: flex; align-items: flex-end; gap: 10px; }
    .fp-label { font-size: 12px; color: var(--muted); display: flex; flex-direction: column; gap: 5px; flex: 1; font-family: 'Jost', sans-serif; letter-spacing: 0.04em; text-transform: uppercase; }
    .fp-label input, .fp-label select { font-size: 14px; padding: 8px 10px; }

    .book-page { overflow: hidden; position: relative; min-height: calc(100dvh - 160px); }
    .book-content { padding: 20px 16px 60px; transition: opacity 0.2s ease; }

    /* Journal cards */
    .book-card { background: #f5f0e8; border: 1px solid #ddd5c0; border-radius: 12px; overflow: hidden; margin-bottom: 16px; }
    .book-card-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px 8px; border-bottom: 1px solid #ddd5c0; }
    .book-card-title { font-size: 10px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: #8a7a5a; font-family: 'Jost', sans-serif; }
    .book-edit-btn {
      display: flex; align-items: center; gap: 4px;
      font-size: 11px; color: #7a6040; font-family: 'Jost', sans-serif;
      background: rgba(180,140,80,0.14); border: 1px solid rgba(180,140,80,0.4);
      border-radius: 5px; padding: 4px 9px; cursor: pointer; user-select: none;
    }
    .book-card-body { padding: 12px 14px; }

    .book-task-group-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: #8a6030;
      margin: 14px 0 4px; display: flex; align-items: center; gap: 6px;
      font-family: 'Jost', sans-serif;
    }
    .book-task-group-label:first-child { margin-top: 0; }
    .book-list-count { font-size: 10px; color: #9a8060; background: #ece5d4; border-radius: 4px; padding: 1px 6px; border: 1px solid #d5c9ad; }
    .book-task-row { font-size: 18px; color: #3a2e1e; line-height: 1.55; padding: 4px 0 4px 24px; position: relative; border-bottom: 1px solid rgba(0,0,0,0.06); font-family: 'Caveat', cursive; }
    .book-task-row:last-child { border-bottom: none; }
    .book-task-row::before { content: '•'; position: absolute; left: 6px; color: #8a7a5a; font-size: 18px; line-height: 1.55; font-family: 'Jost', sans-serif; }
    .book-star { color: #b07030; margin-right: 2px; font-size: 13px; vertical-align: middle; }
    .book-reflection { font-size: 19px; color: #3a2e1e; line-height: 1.85; white-space: pre-line; font-family: 'Caveat', cursive; }
    .book-empty { text-align: center; color: var(--muted); font-size: 15px; padding: 60px 0; font-style: italic; }

    .feed-empty { text-align: center; color: var(--muted); font-size: 16px; padding: 48px 0; }

    /* ── Drag and drop ── */
    .task-drag-row { touch-action: none; }
    .task-drag-row.dragging { opacity: 0.4; }
    .task-drag-row.drag-over { border-top: 2px solid var(--accent); }
    .drag-handle {
      cursor: grab; color: var(--muted); font-size: 16px;
      padding: 0 4px; flex-shrink: 0; user-select: none;
      -webkit-user-select: none; line-height: 1;
    }
    .drag-handle:active { cursor: grabbing; }
  </style>
</head>
<body>

<!-- ══════════════ LOCK SCREEN ══════════════ -->
<div id="lockScreen">
  <div class="lock-title">Tim's Journal</div>
  <div class="lock-sub">Sign in to continue</div>
  <div id="googleSignInBtn"></div>
  <div id="lockError"></div>
</div>

<header class="header" style="display:none;" id="appHeader">
  <h1>Tim's Journal</h1>
  <div class="today" id="todayLabel"></div>
</header>

<!-- ══════════════ WRITE VIEW ══════════════ -->
<section class="view" id="writeView">

  <div class="card" style="display:flex;align-items:center;gap:12px;padding:12px 16px;">
    <div style="font-size:12px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);white-space:nowrap;">Editing</div>
    <input type="date" id="writeDatePicker" onchange="changeWriteDate(this.value)"
      style="flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Jost',sans-serif;font-size:15px;padding:8px 12px;text-align:left;direction:ltr;color-scheme:dark;">
  </div>

  <div class="card">
    <div class="card-label">Add task</div>
    <div style="display:flex;gap:8px;margin-bottom:8px;">
      <select id="manualTaskList" style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Jost',sans-serif;font-size:15px;padding:10px 10px;color-scheme:dark;width:110px;flex-shrink:0;">
        <option value="—">—</option>
        <option value="Basic">Basic</option>
        <option value="Personal">Personal</option>
        <option value="Work" selected>Work</option>
        <option value="Zipf">Zipf</option>
        <option value="Other">Other</option>
      </select>
      <input type="text" id="manualTaskInput" placeholder="Type task…" style="flex:1;" onkeydown="if(event.key==='Enter') addManualTask()">
    </div>
    <button class="btn btn-primary action-btn" onclick="addManualTask()">Add task</button>
    <div id="manualTaskStatus"></div>
  </div>

  <div class="card">
    <div class="card-label">Import tasks</div>
    <input type="file" id="screenshotInput" accept="image/*" multiple style="position:absolute;left:-9999px;width:1px;height:1px;opacity:0;">
    <div style="display:flex;gap:8px;margin-bottom:8px;">
      <button class="btn btn-outline" style="flex:1;" onclick="document.getElementById('screenshotInput').click()">📷 Screenshot</button>
      <button class="btn btn-outline" style="flex:1;" id="recordBtn" onclick="toggleRecording()">🎤 Record</button>
    </div>
    <div id="screenshotStatus"></div>
    <textarea id="extractedBox" placeholder="Extracted tasks will appear here…" style="margin-top:12px;min-height:100px;display:none;"></textarea>
    <div style="margin-top:10px;display:none;gap:8px;flex-wrap:wrap;" id="addTasksRow">
      <button class="btn btn-primary" style="flex:1;" onclick="addExtractedTasks()">Add to tasks</button>
      <button class="btn btn-outline" style="flex:1;" onclick="clearImport()">Clear</button>
    </div>
  </div>

  <div class="card">
    <div class="card-label">Today's completed tasks</div>
    <button class="btn btn-primary action-btn" id="getTasksBtn" onclick="getTasks()">Refresh tasks</button>
    <div id="tasksStatus"></div>
    <div id="tasksDisplay" style="margin-top:14px;"></div>
  </div>

  <div class="card">
    <div class="card-label">Add reflection</div>
    <textarea id="reflectionBox" placeholder="Write your reflection for today…"></textarea>
  </div>

  <div class="card">
    <div class="card-label">Import reflection</div>
    <input type="file" id="photoInput" accept="image/*" style="position:absolute;left:-9999px;width:1px;height:1px;opacity:0;" onchange="handlePhoto(event)">
    <div style="display:flex;gap:8px;margin-bottom:8px;">
      <button class="btn btn-outline" style="flex:1;" onclick="document.getElementById('photoInput').click()">📷 Screenshot</button>
      <button class="btn btn-outline" style="flex:1;" id="reflectionRecordBtn" onclick="toggleReflectionRecording()">🎤 Record</button>
    </div>
    <div id="ocrStatus"></div>
  </div>

  <button class="btn btn-primary action-btn" id="saveBtn" onclick="saveEntry()" style="margin-bottom:16px;">Save entry</button>
  <div id="saveStatus"></div>
  <div style="height:10px;"></div>

</section>

<!-- ══════════════ READ VIEW ══════════════ -->
<section class="view" id="readView">

  <div class="book-header">
    <div class="book-title-row">Tim's Journal</div>
    <div class="book-nav-row">
      <div class="book-nav-btn" id="prevDayBtn" onclick="navigateDay(-1)">‹</div>
      <div class="book-date-block">
        <div class="book-day-sub-nav" id="bookDayLabel"></div>
        <div class="book-date-nav-label" id="bookDateLabel"></div>
      </div>
      <div class="book-nav-btn" id="nextDayBtn" onclick="navigateDay(1)">›</div>
      <div class="book-filter-btn" onclick="toggleFilterPanel()">
        <div class="book-filter-lines">
          <div class="book-filter-line"></div>
          <div class="book-filter-line"></div>
          <div class="book-filter-line"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="filterPanel" class="filter-panel" style="display:none;">
    <div class="filter-panel-inner">
      <div class="fp-row">
        <label class="fp-label">Jump to
          <input type="date" id="filterJumpDate" style="color-scheme:dark;">
        </label>
        <button class="btn btn-primary" style="padding:8px 16px;font-size:14px;" onclick="jumpToDate()">Go</button>
      </div>
      <div class="fp-row">
        <label class="fp-label">Show
          <select id="filterField">
            <option value="all">Everything</option>
            <option value="tasks">Tasks only</option>
            <option value="starred">Starred tasks</option>
            <option value="reflection">Reflections only</option>
            <optgroup label="Tasks by list">
              <option value="list:Basic">Basic</option>
              <option value="list:Personal">Personal</option>
              <option value="list:Work">Work</option>
              <option value="list:Zipf">Zipf</option>
              <option value="list:Other">Other</option>
            </optgroup>
          </select>
        </label>
      </div>
    </div>
  </div>

  <div id="bookPage" class="book-page">
    <div id="bookContent" class="book-content"></div>
  </div>
  <div id="bookStatus"></div>

</section>

<!-- ══════════════ NAV ══════════════ -->
<nav class="tab-nav" id="appNav" style="display:none;">
  <div class="tab-toggle">
    <button class="tab-btn active" id="tab-write" onclick="switchTab('write')">Write</button>
    <button class="tab-btn"        id="tab-read"  onclick="switchTab('read')">Read</button>
  </div>
</nav>

<script>
  // ── Config ────────────────────────────────────────────────
  const SCRIPT_URL   = 'https://script.google.com/macros/s/AKfycbxhwLpYwMqAI6IQaZEBueSkvpqaCGfb06uUsCK6cFYHjKK5tHBId3HVzS-U4Uq6o_kJ/exec';
  const GOOGLE_CLIENT_ID = '334749757917-t606nr5dfec4h2va1dah61nu9rm5rbk9.apps.googleusercontent.com';

  // ── State ─────────────────────────────────────────────────
  let idToken        = null;
  let tasksData      = [];
  let existingPageId = null;
  let extractedTasks = [];

  // ── Utilities ─────────────────────────────────────────────
  function isoDate(d) { return d.toISOString().split('T')[0]; }

  function getWriteDate() {
    const val = document.getElementById('writeDatePicker').value;
    if (val && /^\d{4}-\d{2}-\d{2}$/.test(val)) return val;
    const today = isoDate(new Date());
    document.getElementById('writeDatePicker').value = today;
    return today;
  }

  // ── Google Auth ───────────────────────────────────────────
  function initGoogleAuth() {
    google.accounts.id.initialize({
      client_id:  GOOGLE_CLIENT_ID,
      callback:   handleCredentialResponse,
      auto_select: true,
    });
    google.accounts.id.renderButton(
      document.getElementById('googleSignInBtn'),
      { theme: 'outline', size: 'large', text: 'sign_in_with', shape: 'pill' }
    );
    google.accounts.id.prompt();
  }

  function handleCredentialResponse(response) {
    idToken = response.credential;
    document.getElementById('lockScreen').style.display  = 'none';
    document.getElementById('appHeader').style.display   = '';
    document.getElementById('appNav').style.display      = '';
    document.getElementById('writeView').classList.add('active');
    initApp();
  }

  // ── API helper ────────────────────────────────────────────
  async function api(action, params) {
    const res  = await fetch(SCRIPT_URL, {
      method: 'POST',
      body:   JSON.stringify({ action, params: params || {}, idToken }),
    });
    const text = await res.text();
    if (text.trim().startsWith('<')) {
      throw new Error('Apps Script returned an error page — check deployment access is set to "Anyone".');
    }
    const data = JSON.parse(text);
    if (!data.success) throw new Error(data.error);
    return data.data;
  }

  // ── Init ──────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', () => {
    // Wait for Google GSI library to load
    const interval = setInterval(() => {
      if (window.google && google.accounts) {
        clearInterval(interval);
        initGoogleAuth();
      }
    }, 100);
  });

  function initApp() {
    const now = new Date();
    const todayStr = isoDate(now);
    document.getElementById('todayLabel').textContent =
      now.toLocaleDateString('en-GB', { weekday:'long', year:'numeric', month:'long', day:'numeric' }).replace(',', '');
    document.getElementById('writeDatePicker').value = todayStr;
    document.getElementById('screenshotInput').addEventListener('change', function() {
      if (!this.files || !this.files.length) return;
      extractFromScreenshot();
    });
    setTimeout(() => { checkTodayEntry(); getTasks(); }, 100);
  }

  // ── Date change ───────────────────────────────────────────
  function changeWriteDate(dateStr) {
    if (!dateStr) return;
    existingPageId = null; tasksData = [];
    document.getElementById('reflectionBox').value    = '';
    document.getElementById('tasksDisplay').innerHTML = '';
    document.getElementById('tasksStatus').innerHTML  = '';
    document.getElementById('saveBtn').textContent    = 'Save entry';
    getTasks(dateStr);
    checkTodayEntry(dateStr);
  }

  // ── Tasks ─────────────────────────────────────────────────
  async function getTasks(date) {
    date = date || getWriteDate();
    const btn = document.getElementById('getTasksBtn');
    setBtnLoading(btn, 'Fetching…');
    document.getElementById('tasksStatus').innerHTML = '';
    try {
      const entry = await api('getEntryForDate', { date });
      setBtnLoading(btn, null); btn.textContent = 'Refresh tasks';
      if (entry && entry.tasksText) {
        tasksData = entry.tasksText.split('\n').map(l => {
          const line = l.replace(/^•\s*/, '').trim();
          const m    = line.match(/^\[(.+?)\]\s+(★\s+)?(.+)$/);
          if (m) return { list: m[1], starred: !!m[2], title: m[3] };
          const starred = line.startsWith('★ ');
          return { list: '—', starred, title: starred ? line.slice(2) : line };
        }).filter(t => t.title);
      } else { tasksData = []; }
      renderTasks();
    } catch(err) {
      setBtnLoading(btn, null); btn.textContent = 'Refresh tasks';

  function addManualTask() {
    const input = document.getElementById('manualTaskInput');
    const title = input.value.trim();
    if (!title) { showStatus('manualTaskStatus', 'Please enter a task title.', 'err'); return; }
    const list = document.getElementById('manualTaskList').value;
    const existingLower = new Set(tasksData.map(t => (typeof t === 'object' ? t.title : t).toLowerCase()));
    if (existingLower.has(title.toLowerCase())) { showStatus('manualTaskStatus', 'Task already in list.', 'err'); return; }

    input.value = ''; input.focus();
    showStatus('manualTaskStatus', '✓ Added', 'ok');

  // ── Render tasks ──────────────────────────────────────────
  const LIST_ORDER   = ['Basic', 'Personal', 'Work', 'Zipf'];
  const LIST_OPTIONS = ['—', 'Basic', 'Personal', 'Work', 'Zipf', 'Other'];

  function groupTasksByList(tasks) {
    const groups = {};
    tasks.forEach((t, i) => {
      const title   = typeof t === 'object' ? t.title   : t;
      const list    = typeof t === 'object' ? (t.list || '—') : '—';
      const starred = typeof t === 'object' ? !!t.starred : false;
      if (!groups[list]) groups[list] = [];
      groups[list].push({ title, starred, idx: i, list });
    });
    const keys = Object.keys(groups).sort((a, b) => {
      const ai = LIST_ORDER.indexOf(a), bi = LIST_ORDER.indexOf(b);
      if (ai === -1 && bi === -1) return a.localeCompare(b);
      if (ai === -1) return 1; if (bi === -1) return -1;
      return ai - bi;
    });
    return keys.map(k => ({ list: k, items: groups[k] }));
  }

  function renderGroupedTasks(groups, withHeadings) {
    return groups.map(g => {
      const heading = (withHeadings && g.list && g.list !== '—')
        ? `<div style="font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--accent);padding:10px 0 4px;">${esc(g.list)}</div>`
        : '';
      const rows = g.items.map(item => {
        const opts = LIST_OPTIONS.map(l => `<option value="${l}"${l === item.list ? ' selected' : ''}>${l}</option>`).join('');
        return `<div class="task-drag-row" draggable="true" data-idx="${item.idx}"
          style="display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid var(--border);">
          <span class="drag-handle" title="Drag to reorder">⠿</span>
          <select onchange="updateTaskList(${item.idx},this.value)" style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--muted);font-family:'Jost',sans-serif;font-size:13px;padding:5px 6px;width:90px;flex-shrink:0;color-scheme:dark;">${opts}</select>
          <input type="text" value="${esc(item.title)}" onchange="updateTaskTitle(${item.idx},this.value)" style="flex:1;background:transparent;border:none;color:var(--text);font-family:'Jost',sans-serif;font-size:15px;padding:5px 4px;min-width:0;" />
          <button onclick="toggleStar(${item.idx})" style="background:none;border:none;font-size:17px;cursor:pointer;color:${item.starred ? '#c8a96e' : 'var(--muted)'};flex-shrink:0;padding:0;line-height:1;">${item.starred ? '★' : '☆'}</button>
          <button onclick="deleteTask(${item.idx})" style="background:none;border:none;font-size:16px;cursor:pointer;color:var(--muted);flex-shrink:0;padding:0;line-height:1;">✕</button>
        </div>`;
      }).join('');
      return heading + rows;
    }).join('');
  }

  function renderTasks() {
    const display = document.getElementById('tasksDisplay');
    if (!tasksData.length) { display.innerHTML = '<div class="empty-note">No completed tasks found for today yet.</div>'; return; }
    const groups = groupTasksByList(tasksData);
    const withHeadings = groups.length > 1 || (groups.length === 1 && groups[0].list && groups[0].list !== '—');
    display.innerHTML = renderGroupedTasks(groups, withHeadings);
    if (window._bindDrag) window._bindDrag();
  }

  function tasksAsText() {
    return tasksData.map(t => {
      const list  = typeof t === 'object' ? (t.list  || '—') : '—';
      const title = typeof t === 'object' ? t.title  : t;
      const star  = typeof t === 'object' && t.starred ? '★ ' : '';
      return list && list !== '—' ? `• [${list}] ${star}${title}` : `• ${star}${title}`;
    }).join('\n');
  }

  function updateTaskTitle(i, v) { if (tasksData[i]) tasksData[i].title = v.trim(); }
  function updateTaskList(i, v)  { if (tasksData[i]) { tasksData[i].list = v; renderTasks(); } }
  function deleteTask(i)         { tasksData.splice(i, 1); renderTasks(); }
  function toggleStar(i) {
    if (!tasksData[i]) return;
    if (typeof tasksData[i] === 'string') tasksData[i] = { title: tasksData[i], list: '—', starred: true };
    else tasksData[i].starred = !tasksData[i].starred;
    renderTasks();
  }

  // ── Drag and drop reordering ──────────────────────────────
  (function() {
    let dragIdx  = null;  // tasksData index being dragged
    let touchRow = null;  // DOM element for touch ghost
    let touchY   = 0;

    // Wire up events after each renderTasks call
    const origRender = renderTasks;
    window._bindDrag = function() {
      const display = document.getElementById('tasksDisplay');
      if (!display) return;

      display.querySelectorAll('.task-drag-row').forEach(row => {
        // Desktop drag events
        row.addEventListener('dragstart', e => {
          dragIdx = parseInt(row.dataset.idx);
          setTimeout(() => row.classList.add('dragging'), 0);
          e.dataTransfer.effectAllowed = 'move';
        });
        row.addEventListener('dragend', () => {
          row.classList.remove('dragging');
          display.querySelectorAll('.task-drag-row').forEach(r => r.classList.remove('drag-over'));
          dragIdx = null;
        });
        row.addEventListener('dragover', e => {
          e.preventDefault(); e.dataTransfer.dropEffect = 'move';
          display.querySelectorAll('.task-drag-row').forEach(r => r.classList.remove('drag-over'));
          row.classList.add('drag-over');
        });
        row.addEventListener('drop', e => {
          e.preventDefault();
          const targetIdx = parseInt(row.dataset.idx);
          if (dragIdx === null || dragIdx === targetIdx) return;
          // Move tasksData[dragIdx] to position of targetIdx
          const item = tasksData.splice(dragIdx, 1)[0];
          const newTarget = dragIdx < targetIdx ? targetIdx - 1 : targetIdx;
          tasksData.splice(newTarget, 0, item);
          renderTasks();
          window._bindDrag();
        });

        // Touch events for mobile
        const handle = row.querySelector('.drag-handle');
        if (!handle) return;

        handle.addEventListener('touchstart', e => {
          e.preventDefault();
          dragIdx = parseInt(row.dataset.idx);
          touchY  = e.touches[0].clientY;
          row.classList.add('dragging');
        }, { passive: false });

        handle.addEventListener('touchmove', e => {
          e.preventDefault();
          touchY = e.touches[0].clientY;
          // Highlight the row we're hovering over
          display.querySelectorAll('.task-drag-row').forEach(r => {
            const rect = r.getBoundingClientRect();
            if (touchY >= rect.top && touchY <= rect.bottom && parseInt(r.dataset.idx) !== dragIdx) {
              display.querySelectorAll('.task-drag-row').forEach(x => x.classList.remove('drag-over'));
              r.classList.add('drag-over');
            }
          });
        }, { passive: false });

        handle.addEventListener('touchend', e => {
          e.preventDefault();
          row.classList.remove('dragging');
          // Find which row we dropped on
          let targetRow = null;
          display.querySelectorAll('.task-drag-row').forEach(r => {
            if (r.classList.contains('drag-over')) targetRow = r;
            r.classList.remove('drag-over');
          });
          if (targetRow && dragIdx !== null) {
            const targetIdx = parseInt(targetRow.dataset.idx);
            if (dragIdx !== targetIdx) {
              const item = tasksData.splice(dragIdx, 1)[0];
              const newTarget = dragIdx < targetIdx ? targetIdx - 1 : targetIdx;
              tasksData.splice(newTarget, 0, item);
              renderTasks();
              window._bindDrag();
            }
          }
          dragIdx = null;
        }, { passive: false });
      });
    };
  })();

  async function extractFromScreenshot() {

  // ── Task voice recording ──────────────────────────────────
  let recognition = null, voiceTranscript = '', isRecording = false;

  function toggleRecording() { isRecording ? stopRecording() : startRecording(); }

  function startRecording() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { showStatus('screenshotStatus', 'Voice not supported. Try Safari or Chrome.', 'err'); return; }
    recognition = new SR(); recognition.lang = 'en-GB'; recognition.continuous = true; recognition.interimResults = true;
    voiceTranscript = ''; isRecording = true;
    document.getElementById('recordBtn').textContent = '⏹ Stop';
    showStatus('screenshotStatus', '🔴 Recording — tap Stop when done', 'info');
    document.getElementById('extractedBox').style.display = 'none';
    document.getElementById('addTasksRow').style.display  = 'none';
    recognition.onresult = e => { let t = ''; for (let i = 0; i < e.results.length; i++) t += e.results[i][0].transcript; voiceTranscript = t; document.getElementById('recordStatus').textContent = '🔴 ' + t.slice(-60); };
    recognition.onerror = e => { stopRecording(); showStatus('screenshotStatus', 'Recording error: ' + e.error, 'err'); };
    recognition.onend   = () => { if (isRecording) stopRecording(); };
    recognition.start();
  }

  function stopRecording() {
    isRecording = false;
    if (recognition) { try { recognition.stop(); } catch(e) {} }
    document.getElementById('recordBtn').textContent = '🎤 Record';
    if (voiceTranscript) {
      showStatus('screenshotStatus', '<span class="spin"></span> Analysing recording…', 'info');
      extractFromVoice();
    } else {
      document.getElementById('recordStatus') && (document.getElementById('recordStatus').textContent = '');
    }
  }

  async function extractFromVoice() {
    if (!voiceTranscript) return;
    try {
      const extracted = await api('extractTasksFromTranscript', { transcript: voiceTranscript });
      if (!extracted || !extracted.length) { showStatus('screenshotStatus', 'No tasks found in recording.', 'err'); return; }
      extractedTasks = extracted;
      document.getElementById('extractedBox').value = extracted.map(t => (t.list && t.list !== '—') ? `[${t.list}] ${t.title}` : t.title).join('\n');
      document.getElementById('extractedBox').style.display = 'block';
      document.getElementById('addTasksRow').style.display  = 'flex';
      document.getElementById('screenshotStatus').innerHTML = '';
    } catch(err) {
      showStatus('screenshotStatus', 'Error: ' + err.message, 'err');
    }
  }

  function addExtractedTasks() {
    if (!extractedTasks.length) return;
    const existingLower = new Set(tasksData.map(t => (typeof t === 'object' ? t.title : t).toLowerCase()));
    extractedTasks.forEach(t => {
      if (!existingLower.has(t.title.trim().toLowerCase())) {
        tasksData.push({ title: t.title.trim(), list: t.list || '—', starred: false });
        existingLower.add(t.title.trim().toLowerCase());
      }
    });
    renderTasks();
    clearImport();
  }

  // ── Reflection voice recording ────────────────────────────
  let reflectionRecognition = null, isReflectionRecording = false, reflectionTranscript = '';

  function toggleReflectionRecording() { isReflectionRecording ? stopReflectionRecording() : startReflectionRecording(); }

  function startReflectionRecording() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { showStatus('reflectionVoiceStatus', 'Voice not supported. Try Safari or Chrome.', 'err'); return; }
    reflectionRecognition = new SR(); reflectionRecognition.lang = 'en-GB'; reflectionRecognition.continuous = true; reflectionRecognition.interimResults = true;
    reflectionTranscript = ''; isReflectionRecording = true;
    document.getElementById('reflectionRecordBtn').textContent = '⏹ Stop';
    showStatus('ocrStatus', '🔴 Recording — tap Stop when done', 'info');
    reflectionRecognition.onresult = e => {
      let final = '', interim = '';
      for (let i = 0; i < e.results.length; i++) { if (e.results[i].isFinal) final += e.results[i][0].transcript + ' '; else interim += e.results[i][0].transcript; }
      reflectionTranscript = final + interim;
      document.getElementById('reflectionRecordStatus').textContent = '🔴 ' + reflectionTranscript.slice(-60);
    };
    reflectionRecognition.onerror = e => { stopReflectionRecording(); showStatus('reflectionVoiceStatus', 'Recording error: ' + e.error, 'err'); };
    reflectionRecognition.onend   = () => { if (isReflectionRecording) stopReflectionRecording(); };
    reflectionRecognition.start();
  }

  function stopReflectionRecording() {
    isReflectionRecording = false;
    if (reflectionRecognition) { try { reflectionRecognition.stop(); } catch(e) {} }
    document.getElementById('reflectionRecordBtn').textContent = '🎤 Record';
    if (reflectionTranscript.trim()) {
      const box = document.getElementById('reflectionBox');
      box.value = box.value ? box.value + '\n\n' + reflectionTranscript.trim() : reflectionTranscript.trim();
      showStatus('ocrStatus', '✓ Added to reflection', 'ok');
      setTimeout(() => document.getElementById('ocrStatus').innerHTML = '', 3000);

  // ── Book read view ────────────────────────────────────────
  let bookEntries = [], bookIndex = 0, bookField = 'all';
  let bookLoadingMore = false, stepsInDirection = 0, lastDirection = 0;

  async function initReadView() {
    bookField = document.getElementById('filterField').value;
    showStatus('bookStatus', '<span class="spin"></span> Loading journal…', 'info');
    document.getElementById('bookContent').innerHTML = '';
    bookEntries = []; bookIndex = 0; stepsInDirection = 0; lastDirection = 0;
    try {
      const today    = new Date(), monthAgo = new Date(today);
      monthAgo.setDate(today.getDate() - 30);
      const entries  = await api('getEntries', { startDate: isoDate(monthAgo), endDate: isoDate(today) });
      document.getElementById('bookStatus').innerHTML = '';
      bookEntries = entries.filter(e => e.date);
      bookIndex   = 0;
      renderBookPage(false);
    } catch(err) { showStatus('bookStatus', 'Error: ' + err.message, 'err'); }
  }

  async function loadMoreEntries(direction) {
    if (bookLoadingMore || !bookEntries.length) return;
    bookLoadingMore = true;
    try {
      if (direction === -1) {
        const oldest    = bookEntries[bookEntries.length - 1].date;
        const endDate   = new Date(oldest + 'T12:00:00'); endDate.setDate(endDate.getDate() - 1);
        const startDate = new Date(endDate); startDate.setDate(startDate.getDate() - 30);
        const more = await api('getEntries', { startDate: isoDate(startDate), endDate: isoDate(endDate) });
        if (more && more.length) bookEntries = bookEntries.concat(more.filter(e => e.date));
      } else {
        const newest    = bookEntries[0].date;
        const startDate = new Date(newest + 'T12:00:00'); startDate.setDate(startDate.getDate() + 1);
        const more = await api('getEntries', { startDate: isoDate(startDate), endDate: isoDate(new Date()) });
        if (more && more.length) { bookEntries = more.filter(e => e.date).concat(bookEntries); bookIndex += more.length; }
      }
    } catch(e) { /* silent */ }
    bookLoadingMore = false; updateNavArrows();
  }

  function renderBookPage(animate, direction) {
    const content = document.getElementById('bookContent');
    const entry   = bookEntries[bookIndex];
    updateNavArrows();
    if (entry) {
      const d = new Date(entry.date + 'T12:00:00');
      document.getElementById('bookDayLabel').textContent =
        d.toLocaleDateString('en-GB', { weekday: 'long' });
      document.getElementById('bookDateLabel').textContent =
        d.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
    } else {
      document.getElementById('bookDayLabel').textContent  = '';
      document.getElementById('bookDateLabel').textContent = '';
    }

    if (animate) { content.style.transition = 'opacity 0.18s ease, transform 0.18s ease'; content.style.opacity = '0'; content.style.transform = `translateX(${direction === 1 ? '-30px' : '30px'})`; }

    setTimeout(() => {
      content.innerHTML = entry ? buildPageHTML(entry) : '<div class="book-empty">No entry for this day.</div>';
      const inFrom = direction === 1 ? '30px' : '-30px';
      content.style.transition = 'none'; content.style.opacity = '0';
      content.style.transform  = animate ? `translateX(${inFrom})` : 'translateX(0)';
      requestAnimationFrame(() => requestAnimationFrame(() => {
        content.style.transition = 'opacity 0.22s ease, transform 0.22s ease';
        content.style.opacity    = '1'; content.style.transform = 'translateX(0)';
      }));
    }, animate ? 180 : 0);
  }

  function updateNavArrows() {
    const prev = document.getElementById('prevDayBtn');
    const next = document.getElementById('nextDayBtn');
    if (prev) { if (bookIndex >= bookEntries.length - 1) prev.classList.add('disabled'); else prev.classList.remove('disabled'); }
    if (next) { if (bookIndex <= 0) next.classList.add('disabled'); else next.classList.remove('disabled'); }
  }

  function buildPageHTML(entry) {
    const field = bookField;
    let html = '';

    if ((field === 'all' || field === 'tasks' || field === 'starred' || field.startsWith('list:')) && entry.tasksText) {
      let taskObjs = entry.tasksText.split('\n').map(line => {
        const m = line.match(/^•\s*\[(.+?)\]\s+(★\s+)?(.+)$/);
        if (m) return { list: m[1], starred: !!m[2], title: m[3] };
        const clean = line.replace(/^•\s*/, '').trim(); const starred = clean.startsWith('★ ');
        return { list: '—', starred, title: starred ? clean.slice(2) : clean };
      }).filter(t => t.title);

      if (field === 'starred') taskObjs = taskObjs.filter(t => t.starred);
      else if (field.startsWith('list:')) {
        const ln = field.slice(5);
        taskObjs = ln === 'Other' ? taskObjs.filter(t => LIST_ORDER.indexOf(t.list) === -1 && t.list !== '—') : taskObjs.filter(t => t.list === ln);
      }

      if (taskObjs.length) {
        const groups = groupTasksByList(taskObjs);
        const withH  = !field.startsWith('list:') && field !== 'starred' &&
          (groups.length > 1 || (groups.length === 1 && groups[0].list && groups[0].list !== '—'));
        let inner = '';
        groups.forEach(g => {
          if (withH && g.list && g.list !== '—')
            inner += `<div class="book-task-group-label">${esc(g.list)} <span class="book-list-count">+${g.items.length}</span></div>`;
          g.items.forEach(t => {
            const star = t.starred ? '<span class="book-star">★</span>' : '';
            inner += `<div class="book-task-row">${star}${esc(t.title)}</div>`;
          });
        });
        html += `<div class="book-card">
          <div class="book-card-header">
            <span class="book-card-title">Completed tasks</span>
            <div class="book-edit-btn" onclick="editDate('${entry.date}')">✏ Edit</div>
          </div>
          <div class="book-card-body">${inner}</div>
        </div>`;
      }
    }

    if ((field === 'all' || field === 'reflection') && !field.startsWith('list:') && field !== 'starred' && entry.reflection) {
      html += `<div class="book-card">
        <div class="book-card-header">
          <span class="book-card-title">Reflection</span>
          <div class="book-edit-btn" onclick="editDate('${entry.date}')">✏ Edit</div>
        </div>
        <div class="book-card-body">
          <div class="book-reflection">${esc(entry.reflection)}</div>
        </div>
      </div>`;
    }

    return html || '<div class="book-empty">No entry for this day.</div>';
  }

  function editDate(date) {
    switchTab('write');
    setTimeout(() => {
      document.getElementById('writeDatePicker').value = date;
      changeWriteDate(date);
    }, 50);
  }

  function navigateDay(direction) {
    const next = bookIndex + direction;
    if (next < 0 || next >= bookEntries.length) return;
    bookIndex = next; renderBookPage(true, direction);
    if (direction === lastDirection) stepsInDirection++; else { stepsInDirection = 1; lastDirection = direction; }
    if (stepsInDirection >= 7) { stepsInDirection = 0; loadMoreEntries(direction); }
  }

  function jumpToDate() {
    const dateStr = document.getElementById('filterJumpDate').value;
    if (!dateStr) return;
    const idx = bookEntries.findIndex(e => e.date <= dateStr);
    bookIndex = idx >= 0 ? idx : bookEntries.length - 1;
    stepsInDirection = 0; lastDirection = 0;
    toggleFilterPanel(); renderBookPage(false);
  }

  function toggleFilterPanel() {
    const panel = document.getElementById('filterPanel');
    panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
  }

  // ── Swipe gestures ────────────────────────────────────────
  (function() {
    let startX = 0, startY = 0;
    document.addEventListener('touchstart', e => {
      if (!document.getElementById('readView').classList.contains('active')) return;
      startX = e.touches[0].clientX; startY = e.touches[0].clientY;
    }, { passive: true });
    document.addEventListener('touchend', e => {
      if (!document.getElementById('readView').classList.contains('active')) return;
      const dx = e.changedTouches[0].clientX - startX;
      const dy = e.changedTouches[0].clientY - startY;
      if (Math.abs(dx) < 40 || Math.abs(dy) > Math.abs(dx)) return;
      if (dx < 0) navigateDay(-1); else navigateDay(1);
    }, { passive: true });
  })();

  // ── Tabs ──────────────────────────────────────────────────
  function switchTab(tab) {
    ['write','read'].forEach(t => {
      document.getElementById(t + 'View').classList.toggle('active', t === tab);
      document.getElementById('tab-' + t).classList.toggle('active', t === tab);
    });
    if (tab === 'read') { document.getElementById('filterJumpDate').value = isoDate(new Date()); initReadView(); }
  }

  // ── Helpers ───────────────────────────────────────────────
  function toBase64(file) {
    return new Promise((res, rej) => { const r = new FileReader(); r.onload = () => res(r.result.split(',')[1]); r.onerror = rej; r.readAsDataURL(file); });
  }
  function showStatus(id, msg, type) { document.getElementById(id).innerHTML = `<div class="status ${type}">${msg}</div>`; }
  function autoClear(id, ms) { setTimeout(() => document.getElementById(id).innerHTML = '', ms); }
  function setBtnLoading(btn, label) {
    if (label) { btn._orig = btn.textContent; btn.disabled = true; btn.innerHTML = `<span class="spin"></span> ${label}`; }
    else        { btn.disabled = false; btn.textContent = btn._orig || btn.textContent; }
  }
  function esc(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
